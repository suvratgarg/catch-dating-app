<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Catch — screens & components</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  html,body { margin: 0; padding: 0; background: #f0eee9; font-family: 'Inter', system-ui, sans-serif; }
  *, *::before, *::after { box-sizing: border-box; }
  #tweaks {
    position: fixed; right: 16px; bottom: 16px; z-index: 9999;
    background: #111; color: #eee; border-radius: 14px; padding: 14px;
    font-family: 'Inter', system-ui; font-size: 12px; width: 260px;
    box-shadow: 0 16px 40px rgba(0,0,0,0.3); display: none;
  }
  #tweaks.on { display: block; }
  #tweaks h3 { margin: 0 0 10px; font-size: 11px; letter-spacing: 1.2px; text-transform: uppercase; opacity: 0.6; font-weight: 700; }
  #tweaks .row { margin-bottom: 10px; }
  #tweaks label { display:block; font-size: 10px; letter-spacing: 0.8px; text-transform: uppercase; opacity: 0.6; margin-bottom: 4px; font-weight: 600; }
  #tweaks .seg { display: flex; gap: 4px; background:#222; padding:3px; border-radius:8px; }
  #tweaks .seg button { flex:1; background:transparent; color:#eee; border:none; padding:7px 6px; font:inherit; border-radius:6px; cursor:pointer; font-weight: 500; }
  #tweaks .seg button.sel { background:#FF4E1F; color:#fff; font-weight: 700; }
  #tweaks .muted { font-size: 10px; opacity: 0.5; margin-top: 10px; line-height: 1.4; }
</style>
</head>
<body>
<div id="root"></div>
<div id="tweaks">
  <h3>Tweaks</h3>
  <div class="row"><label>Palette</label><div class="seg" id="t-pal">
    <button data-v="sunset">Sunset</button><button data-v="street">Street</button><button data-v="editorial">Editorial</button>
  </div></div>
  <div class="row"><label>Type</label><div class="seg" id="t-type">
    <button data-v="sporty">Sporty</button><button data-v="editorial">Editorial</button>
  </div></div>
  <div class="row"><label>Mode</label><div class="seg" id="t-dark">
    <button data-v="light">Light</button><button data-v="dark">Dark</button>
  </div></div>
  <div class="muted">Changes apply across every screen on the canvas.</div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tokens.jsx"></script>
<script type="text/babel" src="primitives.jsx"></script>
<script type="text/babel" src="frames/design-canvas.jsx"></script>
<script type="text/babel" src="screens/auth.jsx"></script>
<script type="text/babel" src="screens/home.jsx"></script>
<script type="text/babel" src="screens/match.jsx"></script>
<script type="text/babel" src="screens/messages.jsx"></script>
<script type="text/babel" src="screens/profile.jsx"></script>
<script type="text/babel" src="screens/misc.jsx"></script>
<script type="text/babel" src="screens/dashboard.jsx"></script>
<script type="text/babel" src="screens/clubs.jsx"></script>
<script type="text/babel" src="screens/create.jsx"></script>
<script type="text/babel" src="screens/calendar.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "palette": "sunset",
  "typeKey": "sporty",
  "dark": true
}/*EDITMODE-END*/;

// Phone frame — iOS-shaped but lighter than the ios-frame helper.
function Phone({ children, dark }) {
  return (
    <div style={{
      width: 390, height: 844,
      borderRadius: 56, padding: 8,
      background: dark ? '#0a0a0a' : '#1a1a1a',
      boxShadow: '0 30px 80px rgba(0,0,0,0.22), 0 8px 24px rgba(0,0,0,0.12), inset 0 0 0 1px rgba(255,255,255,0.06)',
      position: 'relative',
    }}>
      <div style={{
        width: '100%', height: '100%',
        borderRadius: 48, overflow: 'hidden',
        position: 'relative',
      }}>{children}</div>
    </div>
  );
}

function Frame({ label, note, theme, type, children }) {
  return (
    <DCArtboard label={label} width={390}>
      <Phone dark={theme.dark}>{children}</Phone>
      {note && <div style={{ marginTop: 10, fontSize: 11, color: 'rgba(60,50,40,0.6)', maxWidth: 390, fontFamily: 'Inter' }}>{note}</div>}
    </DCArtboard>
  );
}

function App() {
  const [pal, setPal] = React.useState(TWEAK_DEFAULTS.palette);
  const [typeKey, setTypeKey] = React.useState(TWEAK_DEFAULTS.typeKey);
  const [dark, setDark] = React.useState(TWEAK_DEFAULTS.dark);

  const theme = resolveTheme(pal, dark);
  const type = TYPE[typeKey];

  // Tweaks wiring
  React.useEffect(() => {
    const onMsg = (e) => {
      if (!e.data || typeof e.data !== 'object') return;
      if (e.data.type === '__activate_edit_mode') document.getElementById('tweaks').classList.add('on');
      if (e.data.type === '__deactivate_edit_mode') document.getElementById('tweaks').classList.remove('on');
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    // Hook up buttons
    const wire = (id, setter, current) => {
      const el = document.getElementById(id);
      el.querySelectorAll('button').forEach(b => {
        b.classList.toggle('sel', b.dataset.v === String(current));
        b.onclick = () => {
          const v = b.dataset.v;
          setter(v === 'true' ? true : v === 'false' ? false : v);
          const keys = id==='t-pal'?{palette:v}:id==='t-type'?{typeKey:v}:{dark:v==='dark'};
          window.parent.postMessage({ type: '__edit_mode_set_keys', edits: keys }, '*');
          el.querySelectorAll('button').forEach(x=>x.classList.remove('sel'));
          b.classList.add('sel');
        };
      });
    };
    wire('t-pal', setPal, pal);
    wire('t-type', setTypeKey, typeKey);
    wire('t-dark', (v)=>setDark(v), dark?'dark':'light');
    return () => window.removeEventListener('message', onMsg);
  }, [pal, typeKey, dark]);

  const fp = { theme, type };

  return (
    <DesignCanvas>
      <div style={{
        padding: '80px 100px 200px',
        fontFamily: "'Inter', system-ui",
        color: 'rgba(40,30,20,0.85)',
      }}>
        {/* Title */}
        <div style={{ marginBottom: 80 }}>
          <div style={{ fontSize: 11, letterSpacing: 3, textTransform: 'uppercase', opacity: 0.5, fontWeight: 600 }}>Catch · Design ·  v1</div>
          <div style={{ fontFamily: type.display, fontSize: 72, fontWeight: type.displayWeight, letterSpacing: '-0.03em', marginTop: 10, lineHeight: 1 }}>
            A dating app that catches<br/>you <em style={{ color: theme.primary, fontStyle:'italic' }}>mid-stride</em>.
          </div>
          <div style={{ fontSize: 16, maxWidth: 640, marginTop: 16, lineHeight: 1.55, color: 'rgba(60,50,40,0.7)' }}>
            Run clubs are social. Running apps are solitary. Catch sits in between: join a run, and if someone catches your eye, catch them in the app right after. No swiping cold strangers — you've already met.
          </div>
          <div style={{ marginTop: 20, display: 'flex', gap: 24, fontSize: 12, color: 'rgba(60,50,40,0.6)' }}>
            <div><b style={{color: theme.primary}}>Palette:</b> {theme.name} — {theme.sub}</div>
            <div><b style={{color: theme.primary}}>Type:</b> {type.name} — {type.sub}</div>
            <div><b style={{color: theme.primary}}>Mode:</b> {dark?'Dark':'Light'}</div>
          </div>
        </div>

        {/* Section 1 — Onboarding */}
        <DCSection title="Onboarding" subtitle="Welcome → phone → OTP → name → gender → photos → pace. A 60-second path to first run.">
          <Frame label="01 · Welcome" {...fp}><ScreenWelcome {...fp}/></Frame>
          <Frame label="02 · Phone" {...fp}><ScreenPhone {...fp}/></Frame>
          <Frame label="03 · OTP" {...fp}><ScreenOtp {...fp}/></Frame>
          <Frame label="04 · Name + DOB" {...fp}><ScreenName {...fp}/></Frame>
          <Frame label="05 · Gender + Interest" {...fp}><ScreenGender {...fp}/></Frame>
          <Frame label="06 · Photos" {...fp}><ScreenPhotos {...fp}/></Frame>
          <Frame label="07 · Pace & runs" {...fp}><ScreenPace {...fp}/></Frame>
        </DCSection>

        {/* Section 2 — Home / Runs */}
        <DCSection title="Home · find a run" subtitle="List feed, live map, run detail, clubs directory, club detail. The flow from 'find something to do tonight' to 'tap to join'.">
          <Frame label="08 · Home feed" {...fp}><ScreenHomeFeed {...fp}/></Frame>
          <Frame label="09 · Home map" {...fp}><ScreenHomeMap {...fp}/></Frame>
          <Frame label="10 · Run detail" {...fp}><ScreenRunDetail {...fp}/></Frame>
          <Frame label="11 · Run clubs" {...fp}><ScreenRunClubs {...fp}/></Frame>
          <Frame label="12 · Club detail" {...fp}><ScreenClubDetail {...fp}/></Frame>
        </DCSection>

        {/* Section 3 — After the run */}
        <DCSection title="After the run · catch someone" subtitle="The app goes quiet during the run. When it's over, you get a roster of people you actually ran with. Swipe only on those.">
          <Frame label="13 · Catches intro" note="Only appears post-run. The 'dating part' is gated behind showing up." {...fp}><ScreenCatchesIntro {...fp}/></Frame>
          <Frame label="14 · Swipe — card" {...fp}><ScreenSwipe {...fp}/></Frame>
          <Frame label="15 · It's a catch!" {...fp}><ScreenMatch {...fp}/></Frame>
          <Frame label="16 · Run recap" note="Shareable, with a 'met someone?' prompt at the bottom." {...fp}><ScreenRecap {...fp}/></Frame>
        </DCSection>

        {/* Section 4 — Messaging */}
        <DCSection title="Messaging" subtitle="Chat is grounded in the shared run. Every thread opens with context, not a blank prompt.">
          <Frame label="17 · Inbox" {...fp}><ScreenMessages {...fp}/></Frame>
          <Frame label="18a · Chat — bubbles" {...fp}><ScreenChat {...fp} variant="bubbles"/></Frame>
          <Frame label="18b · Chat — minimal" note="Variant: inline style — feels more like SMS. A/B option." {...fp}><ScreenChat {...fp} variant="minimal"/></Frame>
        </DCSection>

        {/* Section 5 — Profile */}
        <DCSection title="Profile" subtitle="The profile leads with how you actually run — pace, distances, PR — not aspirational lifestyle shots.">
          <Frame label="19 · Profile (self)" {...fp}><ScreenProfileSelf {...fp}/></Frame>
          <Frame label="20 · Profile (other)" {...fp}><ScreenProfileOther {...fp}/></Frame>
          <Frame label="21 · Edit profile" {...fp}><ScreenEditProfile {...fp}/></Frame>
        </DCSection>

        {/* Section 6 — Misc */}
        <DCSection title="Settings, filters & activity" subtitle="The boring bits done well. Filters feel like adjusting a running watch, not a shopping checkout.">
          <Frame label="22 · Filters" {...fp}><ScreenFilters {...fp}/></Frame>
          <Frame label="23 · Notifications" {...fp}><ScreenNotifications {...fp}/></Frame>
          <Frame label="24 · Settings" {...fp}><ScreenSettings {...fp}/></Frame>
        </DCSection>

        {/* Section 7 — Home / Dashboard */}
        <DCSection title="Home · a dashboard, not a feed" subtitle="The first tab is YOUR run life: next run, open catches, weekly stride, and what might be worth doing next. No infinite scroll.">
          <Frame label="25 · Dashboard" note="Main state. Next-run hero, active catches strip, stride card, recommendations." {...fp}><ScreenDashboard {...fp}/></Frame>
          <Frame label="26 · Dashboard · empty" note="Edge case: first open, no runs booked. Catches are explicitly gated." {...fp}><ScreenDashboardEmpty {...fp}/></Frame>
        </DCSection>

        {/* Section 8 — Clubs tab */}
        <DCSection title="Clubs tab · 3 layout explorations" subtitle="Clubs are the atomic unit of the app. Which layout leads: Spotify-style rows, a club-filtered feed, or a full directory?">
          <Frame label="27 · Variant A — Rows" note="Joined · For you · Nearby. Horizontal scroll per row. Best for breadth + discovery." {...fp}><ScreenClubsRows {...fp}/></Frame>
          <Frame label="28 · Variant B — Feed" note="Club chips top; upcoming-runs feed below. Best for 'what's on this week?'." {...fp}><ScreenClubsFeed {...fp}/></Frame>
          <Frame label="29 · Variant C — Directory" note="Big cards with activity photos, vibe tags, ratings. Best for exploring new clubs." {...fp}><ScreenClubsGrid {...fp}/></Frame>
        </DCSection>

        {/* Section 9 — Create run */}
        <DCSection title="Create a run · host stepper" subtitle="Club admins only. Four steps, each a real decision. We show you the revenue math, offer waitlist + recurring by default, and publish to followers in one tap.">
          <Frame label="30 · Step 1 — Basics" {...fp}><ScreenCreateBasics {...fp}/></Frame>
          <Frame label="31 · Step 2 — Route" {...fp}><ScreenCreateRoute {...fp}/></Frame>
          <Frame label="32 · Step 3 — When + capacity" {...fp}><ScreenCreateWhen {...fp}/></Frame>
          <Frame label="33 · Step 4 — Review" {...fp}><ScreenCreateReview {...fp}/></Frame>
          <Frame label="34 · Live" note="Celebration state. Real-time: 3 taps already." {...fp}><ScreenCreateSuccess {...fp}/></Frame>
          <Frame label="35 · Host manage" note="Post-publish. FULL + waitlist edge case." {...fp}><ScreenHostRun {...fp}/></Frame>
        </DCSection>

        {/* Section 10 — Calendar */}
        <DCSection title="Calendar · timeline + agenda" subtitle="Access from Home. Timeline for 'what's my Wednesday look like?'; Agenda for planning a whole week.">
          <Frame label="36 · Timeline (day)" note="Time-of-day grid. Now-line. Shows joined + interested + solo runs stacked." {...fp}><ScreenCalendarTimeline {...fp}/></Frame>
          <Frame label="37 · Agenda (week)" note="Days stacked. Includes rest day + waitlist position edge states." {...fp}><ScreenCalendarAgenda {...fp}/></Frame>
        </DCSection>

        <div style={{ marginTop: 60, fontSize: 13, lineHeight: 1.6, color: 'rgba(60,50,40,0.65)', maxWidth: 780, borderLeft:`3px solid ${theme.primary}`, paddingLeft: 18 }}>
          <b style={{ color: theme.primary, fontFamily: type.display, fontSize: 14, letterSpacing: 0.5, textTransform:'uppercase' }}>Notes · next steps</b>
          <ul style={{ margin: '10px 0 0 0', paddingLeft: 18 }}>
            <li>Wire up club hosts / moderator tools (create run, check-ins).</li>
            <li>Safety-first flows: report, block, emergency contact mid-run.</li>
            <li>Payment: club fees & pay-per-run (Razorpay integration already noted in settings).</li>
            <li>Consider a "quiet mode" during the run itself — GPS tracker only, no dating UI.</li>
          </ul>
        </div>
      </div>
    </DesignCanvas>
  );
}

// Wait for all babel scripts, then render.
function tryMount() {
  if (!window.ScreenWelcome || !window.DesignCanvas || !window.resolveTheme) {
    return setTimeout(tryMount, 60);
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
}
tryMount();
</script>
</body>
</html>
