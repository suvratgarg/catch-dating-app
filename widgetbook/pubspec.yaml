name: widgetbook_workspace
description: Catch design-system Widgetbook for primitive and screen state review.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  catch_dating_app:
    path: ../
  flutter_riverpod: ^3.0.3
  go_router: ^17.1.0
  image_picker: ^1.2.1
  widgetbook: ^3.24.0
  widgetbook_annotation: ^3.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.11.1
  widgetbook_generator: ^3.24.0

dependency_overrides:
  phosphor_flutter:
    path: ../packages/phosphor_flutter

flutter:
  uses-material-design: true

  assets:
    - assets/branding/catch_icon.png

  fonts:
    - family: Archivo
      fonts:
        - asset: ../assets/fonts/Archivo-Roman-VF.woff2
    - family: IBM Plex Mono
      fonts:
        - asset: ../assets/fonts/IBMPlexMono-Regular.ttf
          weight: 400
        - asset: ../assets/fonts/IBMPlexMono-Medium.ttf
          weight: 500
        - asset: ../assets/fonts/IBMPlexMono-SemiBold.ttf
          weight: 600
        - asset: ../assets/fonts/IBMPlexMono-Bold.ttf
          weight: 700
