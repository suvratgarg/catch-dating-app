name: iOS TestFlight Release

on:
  workflow_dispatch:
    inputs:
      upload_to_testflight:
        description: Upload the exported build to TestFlight after verification.
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  prod-ios:
    name: Prod iOS archive
    runs-on: macos-26
    environment: prod
    timeout-minutes: 60

    env:
      ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
      ASC_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
      EXPORT_PATH: build/ios/export/prod

    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Write prod iOS Maps key
        env:
          GOOGLE_MAPS_IOS_API_KEY_PROD: ${{ secrets.GOOGLE_MAPS_IOS_API_KEY_PROD }}
        run: ./tool/write_ios_maps_key_xcconfig.sh prod

      - name: Write App Store Connect API key
        run: |
          set -euo pipefail
          if [[ -z "${ASC_KEY_ID:-}" || -z "${ASC_ISSUER_ID:-}" || -z "${ASC_KEY_BASE64:-}" ]]; then
            echo "Missing App Store Connect API key secrets."
            exit 1
          fi
          asc_key_dir="$RUNNER_TEMP/appstoreconnect/private_keys"
          mkdir -p "$asc_key_dir"
          /usr/bin/printf '%s' "$ASC_KEY_BASE64" | /usr/bin/base64 -D > "$asc_key_dir/AuthKey_${ASC_KEY_ID}.p8"
          chmod 600 "$asc_key_dir/AuthKey_${ASC_KEY_ID}.p8"

      - name: Prepare prod Flutter iOS configuration
        run: ./tool/flutter_with_env.sh prod build ios --release --config-only

      - name: Archive prod iOS app
        run: |
          set -euo pipefail
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme prod \
            -configuration Release-prod \
            -destination generic/platform=iOS \
            -archivePath "$RUNNER_TEMP/Runner.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            -hideShellScriptEnvironment \
            archive

      - name: Verify archived Maps key
        run: |
          node tool/validate_google_maps_config.mjs \
            --env prod \
            --platform ios \
            --ios-built-plist "$RUNNER_TEMP/Runner.xcarchive/Products/Applications/Runner.app/Info.plist"

      - name: Export prod IPA
        run: |
          set -euo pipefail
          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/Runner.xcarchive" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist ios/ExportOptions.prod.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      - name: Verify exported entitlements
        run: |
          set -euo pipefail
          ipa_path="$EXPORT_PATH/Catch.ipa"
          extract_dir="$RUNNER_TEMP/catch-ipa"
          profile_plist="$RUNNER_TEMP/catch-profile.plist"

          test -f "$ipa_path"
          rm -rf "$extract_dir"
          mkdir -p "$extract_dir"
          ditto -x -k "$ipa_path" "$extract_dir"

          node tool/validate_google_maps_config.mjs \
            --env prod \
            --platform ios \
            --ios-built-plist "$extract_dir/Payload/Runner.app/Info.plist"

          openssl cms -inform DER -verify -noverify \
            -in "$extract_dir/Payload/Runner.app/embedded.mobileprovision" \
            -out "$profile_plist"

          profile_name="$(/usr/libexec/PlistBuddy -c 'Print :Name' "$profile_plist")"
          healthkit="$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:com.apple.developer.healthkit' "$profile_plist")"
          app_id="$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:application-identifier' "$profile_plist")"

          if [[ "$healthkit" != "true" ]]; then
            echo "Exported provisioning profile is missing HealthKit."
            exit 1
          fi

          codesign -d --entitlements - "$extract_dir/Payload/Runner.app" > "$RUNNER_TEMP/catch-entitlements.txt" 2>/dev/null
          grep -q 'com.apple.developer.healthkit' "$RUNNER_TEMP/catch-entitlements.txt"
          grep -q 'applinks:catchdates.com' "$RUNNER_TEMP/catch-entitlements.txt"

          {
            echo "## iOS export verification"
            echo
            echo "- IPA: \`$ipa_path\`"
            echo "- Profile: \`$profile_name\`"
            echo "- App ID: \`$app_id\`"
            echo "- HealthKit entitlement: \`$healthkit\`"
            echo "- Associated Domains entitlement: verified"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v6
        with:
          name: catch-ios-prod-ipa
          path: build/ios/export/prod/Catch.ipa
          if-no-files-found: error
          retention-days: 14

      - name: Upload to TestFlight
        if: ${{ github.event.inputs.upload_to_testflight == 'true' }}
        run: |
          set -euo pipefail
          upload_options="$RUNNER_TEMP/ExportOptions.upload.plist"
          cp ios/ExportOptions.prod.plist "$upload_options"
          /usr/libexec/PlistBuddy -c 'Set :destination upload' "$upload_options"

          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/Runner.xcarchive" \
            -exportPath "$RUNNER_TEMP/testflight-upload" \
            -exportOptionsPlist "$upload_options" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"
