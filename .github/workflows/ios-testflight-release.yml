name: iOS TestFlight Release

on:
  push:
    branches:
      - main
    paths:
      - '.github/actions/setup-flutter/**'
      - '.github/workflows/ios-testflight-release.yml'
      - 'assets/**'
      - 'ios/**'
      - 'lib/**'
      - 'packages/**'
      - 'pubspec.lock'
      - 'pubspec.yaml'
      - 'tool/**'
  workflow_dispatch:
    inputs:
      app_role:
        description: App binary to archive.
        required: true
        default: consumer
        type: choice
        options:
          - consumer
          - host
      upload_to_testflight:
        description: Upload the manual archive to TestFlight. Consumer uploads are break-glass; Host uploads automatically on main.
        required: true
        default: false
        type: boolean
      break_glass_reason:
        description: Required when a manual TestFlight upload is requested.
        required: false
        default: ''
        type: string

permissions:
  contents: read

jobs:
  prod-ios:
    name: Prod iOS archive (${{ github.event_name == 'push' && 'host' || inputs.app_role }})
    runs-on: macos-26
    environment: prod
    timeout-minutes: 60

    env:
      ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
      ASC_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}

    steps:
      - uses: actions/checkout@v6

      - name: Resolve release target
        env:
          APP_ROLE_INPUT: ${{ github.event.inputs.app_role || 'consumer' }}
          UPLOAD_TO_TESTFLIGHT_INPUT: ${{ github.event.inputs.upload_to_testflight || 'false' }}
        run: |
          set -euo pipefail

          if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            app_role="host"
            upload_to_testflight="true"
          else
            app_role="$APP_ROLE_INPUT"
            upload_to_testflight="$UPLOAD_TO_TESTFLIGHT_INPUT"
          fi

          case "$app_role" in
            consumer)
              archive_name="Runner"
              expected_bundle_id="com.catchdates.app"
              export_path="build/ios/export/prod"
              ios_configuration="Release-prod"
              ios_scheme="prod"
              ;;
            host)
              archive_name="HostRunner"
              expected_bundle_id="com.catchdates.host"
              export_path="build/ios/export/host-prod"
              ios_configuration="Release-host-prod"
              ios_scheme="host-prod"
              ;;
            *)
              echo "Unsupported app_role: $app_role"
              exit 1
              ;;
          esac

          version_line="$(awk '/^version: / { print $2; exit }' pubspec.yaml)"
          build_name="${version_line%%+*}"
          build_number="${FLUTTER_BUILD_NUMBER:-$(date -u +%Y%m%d)${GITHUB_RUN_NUMBER}${GITHUB_RUN_ATTEMPT}}"

          {
            echo "APP_ROLE=$app_role"
            echo "ARCHIVE_NAME=$archive_name"
            echo "EXPECTED_BUNDLE_ID=$expected_bundle_id"
            echo "EXPORT_PATH=$export_path"
            echo "IOS_CONFIGURATION=$ios_configuration"
            echo "IOS_SCHEME=$ios_scheme"
            echo "UPLOAD_TO_TESTFLIGHT=$upload_to_testflight"
            echo "FLUTTER_BUILD_NAME=$build_name"
            echo "FLUTTER_BUILD_NUMBER=$build_number"
          } >> "$GITHUB_ENV"

      - uses: ./.github/actions/setup-flutter

      - run: flutter pub get

      - name: Configure archive path
        run: echo "ARCHIVE_PATH=$RUNNER_TEMP/${ARCHIVE_NAME}.xcarchive" >> "$GITHUB_ENV"

      - name: Write prod iOS Maps key
        env:
          GOOGLE_MAPS_IOS_API_KEY_PROD: ${{ secrets.GOOGLE_MAPS_IOS_API_KEY_PROD }}
        run: ./tool/write_ios_maps_key_xcconfig.sh prod

      - name: Write App Store Connect API key
        run: |
          set -euo pipefail
          if [[ -z "${ASC_KEY_ID:-}" || -z "${ASC_ISSUER_ID:-}" || -z "${ASC_KEY_BASE64:-}" ]]; then
            echo "Missing App Store Connect API key secrets."
            exit 1
          fi
          asc_key_dir="$RUNNER_TEMP/appstoreconnect/private_keys"
          mkdir -p "$asc_key_dir"
          /usr/bin/printf '%s' "$ASC_KEY_BASE64" | /usr/bin/base64 -D > "$asc_key_dir/AuthKey_${ASC_KEY_ID}.p8"
          chmod 600 "$asc_key_dir/AuthKey_${ASC_KEY_ID}.p8"

      - name: Prepare prod Flutter iOS configuration
        run: ./tool/flutter_with_env.sh prod --role "$APP_ROLE" build ios --release --config-only --build-name="$FLUTTER_BUILD_NAME" --build-number="$FLUTTER_BUILD_NUMBER"

      - name: Archive prod iOS app
        run: |
          set -euo pipefail
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme "$IOS_SCHEME" \
            -configuration "$IOS_CONFIGURATION" \
            -destination generic/platform=iOS \
            -archivePath "$ARCHIVE_PATH" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            -hideShellScriptEnvironment \
            archive

      - name: Verify archived Maps key
        run: |
          set -euo pipefail
          archived_app="$(find "$ARCHIVE_PATH/Products/Applications" -maxdepth 1 -type d -name '*.app' -print -quit)"
          if [[ -z "$archived_app" ]]; then
            echo "Could not find archived app in $ARCHIVE_PATH/Products/Applications."
            exit 1
          fi

          bundle_id="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$archived_app/Info.plist")"
          if [[ "$bundle_id" != "$EXPECTED_BUNDLE_ID" ]]; then
            echo "Archived bundle ID '$bundle_id' did not match expected '$EXPECTED_BUNDLE_ID'."
            exit 1
          fi

          node tool/firebase/validate_google_maps_config.mjs \
            --env prod \
            --platform ios \
            --ios-built-plist "$archived_app/Info.plist"

      - name: Export prod IPA
        run: |
          set -euo pipefail
          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist ios/ExportOptions.prod.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      - name: Verify exported entitlements
        run: |
          set -euo pipefail
          ipa_path="$(find "$EXPORT_PATH" -maxdepth 1 -type f -name '*.ipa' -print -quit)"
          extract_dir="$RUNNER_TEMP/${APP_ROLE}-ipa"
          profile_plist="$RUNNER_TEMP/${APP_ROLE}-profile.plist"

          if [[ -z "$ipa_path" ]]; then
            echo "Could not find exported IPA under $EXPORT_PATH."
            exit 1
          fi
          rm -rf "$extract_dir"
          mkdir -p "$extract_dir"
          ditto -x -k "$ipa_path" "$extract_dir"
          exported_app="$(find "$extract_dir/Payload" -maxdepth 1 -type d -name '*.app' -print -quit)"
          if [[ -z "$exported_app" ]]; then
            echo "Could not find exported .app inside $ipa_path."
            exit 1
          fi

          bundle_id="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$exported_app/Info.plist")"
          if [[ "$bundle_id" != "$EXPECTED_BUNDLE_ID" ]]; then
            echo "Exported bundle ID '$bundle_id' did not match expected '$EXPECTED_BUNDLE_ID'."
            exit 1
          fi

          node tool/firebase/validate_google_maps_config.mjs \
            --env prod \
            --platform ios \
            --ios-built-plist "$exported_app/Info.plist"

          openssl cms -inform DER -verify -noverify \
            -in "$exported_app/embedded.mobileprovision" \
            -out "$profile_plist"

          profile_name="$(/usr/libexec/PlistBuddy -c 'Print :Name' "$profile_plist")"
          healthkit="$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:com.apple.developer.healthkit' "$profile_plist")"
          app_id="$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:application-identifier' "$profile_plist")"

          if [[ "$healthkit" != "true" ]]; then
            echo "Exported provisioning profile is missing HealthKit."
            exit 1
          fi

          entitlements_path="$RUNNER_TEMP/${APP_ROLE}-entitlements.txt"
          codesign -d --entitlements - "$exported_app" > "$entitlements_path" 2>/dev/null
          grep -q 'com.apple.developer.healthkit' "$entitlements_path"
          grep -q 'applinks:catchdates.com' "$entitlements_path"

          {
            echo "## iOS export verification"
            echo
            echo "- App role: \`$APP_ROLE\`"
            echo "- IPA: \`$ipa_path\`"
            echo "- Bundle ID: \`$bundle_id\`"
            echo "- Profile: \`$profile_name\`"
            echo "- App ID: \`$app_id\`"
            echo "- HealthKit entitlement: \`$healthkit\`"
            echo "- Associated Domains entitlement: verified"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v6
        with:
          name: catch-ios-${{ github.event_name == 'push' && 'host' || inputs.app_role }}-prod-ipa
          path: build/ios/export/**/*.ipa
          if-no-files-found: error
          retention-days: 14

      - name: Guard break-glass TestFlight upload
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.upload_to_testflight == 'true' }}
        env:
          BREAK_GLASS_REASON: ${{ github.event.inputs.break_glass_reason }}
        run: |
          set -euo pipefail
          if [[ -z "${BREAK_GLASS_REASON//[[:space:]]/}" ]]; then
            echo "Manual GitHub TestFlight upload requires a reason."
            echo "Consumer TestFlight remains Xcode Cloud-first; Host uploads automatically from main until Host Xcode Cloud distribution is safe."
            exit 1
          fi

          {
            echo "## Manual TestFlight upload"
            echo
            echo "This manual GitHub upload path is being used for:"
            echo
            echo "$BREAK_GLASS_REASON"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload to TestFlight
        if: ${{ github.event_name == 'push' || github.event.inputs.upload_to_testflight == 'true' }}
        run: |
          set -euo pipefail
          upload_options="$RUNNER_TEMP/ExportOptions.upload.plist"
          cp ios/ExportOptions.prod.plist "$upload_options"
          /usr/libexec/PlistBuddy -c 'Set :destination upload' "$upload_options"

          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$RUNNER_TEMP/testflight-upload" \
            -exportOptionsPlist "$upload_options" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"
