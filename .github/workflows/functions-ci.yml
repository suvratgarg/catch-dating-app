name: Functions CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & test Functions
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - id: toolchain
        uses: ./.github/actions/load-toolchain

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ steps.toolchain.outputs.node-version }}
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - run: npm --prefix functions ci

      - name: Firestore contract check
        run: node tool/contracts/check_firestore_contract.mjs

      - name: Functions governance checks
        run: node tool/run.mjs check audit:fn-rate-limits audit:fn-readme-inventory

      - name: Firebase release guard tests
        run: >-
          node --test
          tool/firebase/plan_firebase_deploy_targets.test.mjs
          tool/firebase/check_client_callable_dependencies.test.mjs

      - name: Functions lint
        run: npm --prefix functions run lint

      - name: Functions tests
        run: npm --prefix functions test
