name: Marketing Website

on:
  pull_request:
    paths:
      - ".github/actions/**"
      - ".github/workflows/marketing-website.yml"
      - ".github/workflows/react-surface-validation.yml"
      - ".firebaserc"
      - "firebase.json"
      - "package.json"
      - "package-lock.json"
      - "website/**"
      - "packages/web-config/**"
      - "packages/web-ui/**"
      - "design/tokens/**"
      - "design/components/**"
      - "design/web-ui/**"
      - "design/website/**"
      - "docs/audit_registry/web_shared_primitive_adoption.json"
      - "docs/generated/react_dependency_graph/**"
      - "tool/ci/toolchain.env"
      - "tool/design_tokens.dart"
      - "tool/design/check_component_lexicon.mjs"
      - "tool/design/check_component_lexicon.test.mjs"
      - "tool/web/check_shared_web_ui_adoption.mjs"
      - "tool/web/check_storybook_visuals.mjs"
      - "tool/web/check_react_controller_test_targets.mjs"
      - "tool/web/react_controller_test_targets.json"
      - "tool/web/react_dependency_graph.mjs"
      - "tool/web/react_dependency_graph.test.mjs"
      - "tool/env/check_web_hosting_env.mjs"
      - "tool/firebase_with_env.sh"
      - "tool/marketing/**"
      - "tool/host_discovery/**"
      - "tool/organizer_intake/**"
  push:
    branches: [main]
    paths:
      - ".github/actions/**"
      - ".github/workflows/marketing-website.yml"
      - ".github/workflows/react-surface-validation.yml"
      - ".firebaserc"
      - "firebase.json"
      - "package.json"
      - "package-lock.json"
      - "website/**"
      - "packages/web-config/**"
      - "packages/web-ui/**"
      - "design/tokens/**"
      - "design/components/**"
      - "design/web-ui/**"
      - "design/website/**"
      - "docs/audit_registry/web_shared_primitive_adoption.json"
      - "docs/generated/react_dependency_graph/**"
      - "tool/ci/toolchain.env"
      - "tool/design_tokens.dart"
      - "tool/design/check_component_lexicon.mjs"
      - "tool/design/check_component_lexicon.test.mjs"
      - "tool/web/check_shared_web_ui_adoption.mjs"
      - "tool/web/check_storybook_visuals.mjs"
      - "tool/web/check_react_controller_test_targets.mjs"
      - "tool/web/react_controller_test_targets.json"
      - "tool/web/react_dependency_graph.mjs"
      - "tool/web/react_dependency_graph.test.mjs"
      - "tool/env/check_web_hosting_env.mjs"
      - "tool/firebase_with_env.sh"
      - "tool/marketing/**"
      - "tool/host_discovery/**"
      - "tool/organizer_intake/**"
  workflow_dispatch:
    inputs:
      update_visual_baselines:
        description: Capture Ubuntu visual baselines and upload them for review
        required: false
        type: boolean
        default: false

concurrency:
  group: marketing-website-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate marketing website
    uses: ./.github/workflows/react-surface-validation.yml
    with:
      surface: marketing
      update_visual_baselines: ${{ github.event_name == 'workflow_dispatch' && inputs.update_visual_baselines }}

  deploy:
    name: Deploy marketing Hosting
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: prod-hosting
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - id: toolchain
        uses: ./.github/actions/load-toolchain

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ steps.toolchain.outputs.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Install Firestore read dependencies
        run: npm --prefix functions ci --omit=dev

      - run: npm install -g firebase-tools@${{ steps.toolchain.outputs.firebase-tools-version }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Validate production marketing environment
        env:
          VITE_GTM_ID: ${{ vars.VITE_GTM_ID }}
          VITE_APP_STORE_URL: ${{ vars.VITE_APP_STORE_URL }}
          VITE_PLAY_STORE_URL: ${{ vars.VITE_PLAY_STORE_URL }}
          VITE_WEBSITE_APPCHECK_SITE_KEY: ${{ vars.VITE_WEBSITE_APPCHECK_SITE_KEY }}
          VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ vars.VITE_FIREBASE_MEASUREMENT_ID }}
        run: node tool/env/check_web_hosting_env.mjs marketing --expected-project-id catch-dating-app-64e51

      - name: Read production organizer claim readiness
        run: node tool/organizer_intake/sync_claim_targets_to_firestore.mjs --env prod --receipt /tmp/organizer-claim-target-readiness.json --json

      - name: Deploy production marketing site
        env:
          ORGANIZER_CLAIM_TARGET_PROJECT_ID: catch-dating-app-64e51
          ORGANIZER_CLAIM_TARGET_RECEIPT: /tmp/organizer-claim-target-readiness.json
          VITE_GTM_ID: ${{ vars.VITE_GTM_ID }}
          VITE_APP_STORE_URL: ${{ vars.VITE_APP_STORE_URL }}
          VITE_PLAY_STORE_URL: ${{ vars.VITE_PLAY_STORE_URL }}
          VITE_WEBSITE_APPCHECK_SITE_KEY: ${{ vars.VITE_WEBSITE_APPCHECK_SITE_KEY }}
          VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ vars.VITE_FIREBASE_MEASUREMENT_ID }}
        run: ./tool/firebase_with_env.sh prod deploy --only hosting:marketing --non-interactive

      - name: Verify production unknown paths return HTTP 404
        run: node website/scripts/verifyHosting404.mjs https://catchdates.com
