name: Release Readiness

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to verify before release.
        required: true
        default: prod
        type: choice
        options:
          - staging
          - prod
      app_role:
        description: App role to verify.
        required: true
        default: consumer
        type: choice
        options:
          - consumer
          - host
          - both

jobs:
  checklist:
    name: Release checklist
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: stable
          cache: true

      - run: flutter pub get

      - run: npm --prefix functions ci

      - run: npm install -g firebase-tools@15.20.0

      - name: Validate checked-in Firebase config for environment
        run: |
          roles="${{ inputs.app_role }}"
          if [[ "$roles" == "both" ]]; then
            roles="consumer host"
          fi

          for role in $roles; do
            ./tool/use_firebase_environment.sh "${{ inputs.environment }}" "$role"
            ./tool/validate_firebase_environment.sh "${{ inputs.environment }}" "$role"
          done

      - name: Flutter analysis
        run: flutter analyze --no-fatal-infos

      - name: Flutter tests
        run: flutter test --concurrency=1

      - name: Firestore contract check
        run: node tool/contracts/check_firestore_contract.mjs

      - name: Functions lint
        run: npm --prefix functions run lint

      - name: Functions tests
        run: npm --prefix functions test

      - name: Firestore rules tests
        run: firebase emulators:exec --project demo-catch-rules --only firestore,storage "npm --prefix functions run test:rules"

      - name: Build release web artifact
        run: |
          roles="${{ inputs.app_role }}"
          if [[ "$roles" == "both" ]]; then
            roles="consumer host"
          fi

          for role in $roles; do
            if [[ "$role" == "consumer" ]]; then
              ./tool/flutter_with_env.sh "${{ inputs.environment }}" build web --release
            else
              ./tool/flutter_with_env.sh "${{ inputs.environment }}" --role host build web --release
            fi
          done

      - name: Write release checklist summary
        run: |
          {
            echo "## Release readiness"
            echo
            echo "- Environment: \`${{ inputs.environment }}\`"
            echo "- App role: \`${{ inputs.app_role }}\`"
            echo "- Firebase config validation: passed"
            echo "- Flutter analysis: passed"
            echo "- Flutter tests: passed"
            echo "- Firestore contract check: passed"
            echo "- Functions lint/tests: passed"
            echo "- Firestore rules emulator tests: passed"
            echo "- Release web build: passed"
            echo
            echo "Still required outside this workflow:"
            echo "- TestFlight upload/install evidence."
            echo "- Play internal testing evidence."
            echo "- Crashlytics dashboard event evidence."
            echo "- Analytics DebugView event evidence."
            echo "- Store metadata, screenshots, privacy forms, and legal/support URLs."
          } >> "$GITHUB_STEP_SUMMARY"
