name: Release Readiness

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to verify before release.
        required: true
        default: prod
        type: choice
        options:
          - staging
          - prod

jobs:
  checklist:
    name: Release checklist
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: stable
          cache: true

      - run: flutter pub get

      - run: npm --prefix functions ci

      - run: npm install -g firebase-tools@15.1.0

      - name: Validate checked-in Firebase config for environment
        run: |
          ./tool/use_firebase_environment.sh "${{ inputs.environment }}"
          ./tool/validate_firebase_environment.sh "${{ inputs.environment }}"

      - name: Flutter analysis
        run: flutter analyze --no-fatal-infos

      - name: Flutter tests
        run: flutter test --concurrency=1

      - name: Firestore contract check
        run: node tool/check_firestore_contract.mjs

      - name: Functions lint
        run: npm --prefix functions run lint

      - name: Functions tests
        run: npm --prefix functions test

      - name: Firestore rules tests
        run: firebase emulators:exec --project demo-catch-rules --only firestore,storage "npm --prefix functions run test:rules"

      - name: Build release web artifact
        run: ./tool/flutter_with_env.sh "${{ inputs.environment }}" build web --release

      - name: Write release checklist summary
        run: |
          {
            echo "## Release readiness"
            echo
            echo "- Environment: \`${{ inputs.environment }}\`"
            echo "- Firebase config validation: passed"
            echo "- Flutter analysis: passed"
            echo "- Flutter tests: passed"
            echo "- Firestore contract check: passed"
            echo "- Functions lint/tests: passed"
            echo "- Firestore rules emulator tests: passed"
            echo "- Release web build: passed"
            echo
            echo "Still required outside this workflow:"
            echo "- TestFlight upload/install evidence."
            echo "- Play internal testing evidence."
            echo "- Crashlytics dashboard event evidence."
            echo "- Analytics DebugView event evidence."
            echo "- Store metadata, screenshots, privacy forms, and legal/support URLs."
          } >> "$GITHUB_STEP_SUMMARY"
