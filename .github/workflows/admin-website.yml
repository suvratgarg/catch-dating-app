name: Admin Website

on:
  pull_request:
    paths:
      - ".github/actions/**"
      - ".github/workflows/admin-website.yml"
      - ".github/workflows/react-surface-validation.yml"
      - ".firebaserc"
      - "admin/**"
      - "contracts/callables/**"
      - "contracts/callable_responses/**"
      - "contracts/shared/**"
      - "design/admin/**"
      - "design/components/**"
      - "design/web-ui/**"
      - "docs/audit_registry/web_shared_primitive_adoption.json"
      - "firebase.json"
      - "package.json"
      - "package-lock.json"
      - "packages/web-ui/**"
      - "tool/ci/toolchain.env"
      - "tool/env/check_web_hosting_env.mjs"
      - "tool/design/check_component_lexicon.mjs"
      - "tool/design/check_component_lexicon.test.mjs"
      - "tool/web/check_shared_web_ui_adoption.mjs"
      - "tool/web/check_storybook_visuals.mjs"
      - "tool/web/check_react_controller_test_targets.mjs"
      - "tool/web/react_controller_test_targets.json"
      - "tool/organizer_intake/**"
  push:
    branches: [main]
    paths:
      - ".github/actions/**"
      - ".github/workflows/admin-website.yml"
      - ".github/workflows/react-surface-validation.yml"
      - ".firebaserc"
      - "admin/**"
      - "contracts/callables/**"
      - "contracts/callable_responses/**"
      - "contracts/shared/**"
      - "design/admin/**"
      - "design/components/**"
      - "design/web-ui/**"
      - "docs/audit_registry/web_shared_primitive_adoption.json"
      - "firebase.json"
      - "package.json"
      - "package-lock.json"
      - "packages/web-ui/**"
      - "tool/ci/toolchain.env"
      - "tool/env/check_web_hosting_env.mjs"
      - "tool/design/check_component_lexicon.mjs"
      - "tool/design/check_component_lexicon.test.mjs"
      - "tool/web/check_shared_web_ui_adoption.mjs"
      - "tool/web/check_storybook_visuals.mjs"
      - "tool/web/check_react_controller_test_targets.mjs"
      - "tool/web/react_controller_test_targets.json"
      - "tool/organizer_intake/**"
  workflow_dispatch:
    inputs:
      update_visual_baselines:
        description: Capture Ubuntu visual baselines and upload them for review
        required: false
        type: boolean
        default: false

concurrency:
  group: admin-website-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate admin website
    uses: ./.github/workflows/react-surface-validation.yml
    with:
      surface: admin
      update_visual_baselines: ${{ github.event_name == 'workflow_dispatch' && inputs.update_visual_baselines }}

  deploy:
    name: Deploy admin Hosting
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: prod-hosting
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - id: toolchain
        uses: ./.github/actions/load-toolchain

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ steps.toolchain.outputs.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - run: npm install -g firebase-tools@${{ steps.toolchain.outputs.firebase-tools-version }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Validate production admin environment
        env:
          VITE_ADMIN_DATA_MODE: ${{ vars.VITE_ADMIN_DATA_MODE }}
          VITE_ADMIN_FIREBASE_ENV: ${{ vars.VITE_ADMIN_FIREBASE_ENV }}
          VITE_ADMIN_APPCHECK_SITE_KEY: ${{ vars.VITE_ADMIN_APPCHECK_SITE_KEY }}
          VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ vars.VITE_FIREBASE_MEASUREMENT_ID }}
        run: node tool/env/check_web_hosting_env.mjs admin --expected-firebase-env prod --expected-project-id catch-dating-app-64e51

      - name: Deploy production admin site
        env:
          VITE_ADMIN_DATA_MODE: ${{ vars.VITE_ADMIN_DATA_MODE }}
          VITE_ADMIN_FIREBASE_ENV: ${{ vars.VITE_ADMIN_FIREBASE_ENV }}
          VITE_ADMIN_APPCHECK_SITE_KEY: ${{ vars.VITE_ADMIN_APPCHECK_SITE_KEY }}
          VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ vars.VITE_FIREBASE_MEASUREMENT_ID }}
        run: ./tool/firebase_with_env.sh prod deploy --only hosting:admin --non-interactive
