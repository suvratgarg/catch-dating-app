name: App Build Matrix

on:
  pull_request:
    paths:
      - 'android/**'
      - 'assets/**'
      - 'ios/**'
      - 'lib/**'
      - 'macos/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'tool/dart_defines/**'
      - 'tool/flutter_with_env.sh'
      - 'tool/use_firebase_environment.sh'
      - 'web/**'
      - '.github/workflows/app-build-matrix.yml'
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'assets/**'
      - 'ios/**'
      - 'lib/**'
      - 'macos/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'tool/dart_defines/**'
      - 'tool/flutter_with_env.sh'
      - 'tool/use_firebase_environment.sh'
      - 'web/**'
      - '.github/workflows/app-build-matrix.yml'
  workflow_dispatch:

jobs:
  web:
    name: Web build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build dev web artifact
        run: ./tool/flutter_with_env.sh dev build web --debug

  android:
    name: Android debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build dev Android debug artifact
        run: ./tool/flutter_with_env.sh dev build apk --debug

  ios:
    name: iOS simulator build
    runs-on: macos-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build dev iOS simulator artifact
        run: ./tool/flutter_with_env.sh dev build ios --simulator --no-codesign
