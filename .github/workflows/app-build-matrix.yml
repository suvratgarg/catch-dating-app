name: App Build Matrix

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  web:
    name: Web build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build dev web artifact
        run: ./tool/flutter_with_env.sh dev build web --debug

      - name: Build dev host web artifact
        run: ./tool/flutter_with_env.sh dev --role host build web --debug

      # Also compile the prod config (prod dart-defines + prod Firebase
      # options) so a prod-only build break is caught on PRs, not at release.
      - name: Build prod web artifact
        run: ./tool/flutter_with_env.sh prod build web --release

      - name: Build prod host web artifact
        run: ./tool/flutter_with_env.sh prod --role host build web --release

  android:
    name: Android debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Write dev Android Maps key
        env:
          GOOGLE_MAPS_ANDROID_API_KEY_DEV: ${{ secrets.GOOGLE_MAPS_ANDROID_API_KEY_DEV }}
        run: |
          key="${GOOGLE_MAPS_ANDROID_API_KEY_DEV:-}"
          if [[ -z "$key" ]]; then
            echo "Missing GOOGLE_MAPS_ANDROID_API_KEY_DEV secret."
            exit 1
          fi
          printf '\nGOOGLE_MAPS_ANDROID_API_KEY_DEV=%s\n' "$key" >> android/local.properties

      - name: Build dev Android debug artifact
        run: ./tool/flutter_with_env.sh dev build apk --debug

      - name: Build dev host Android debug artifact
        run: ./tool/flutter_with_env.sh dev --role host build apk --debug

  ios:
    name: iOS simulator build
    runs-on: macos-26
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Write dev iOS Maps key
        env:
          GOOGLE_MAPS_IOS_API_KEY_DEV: ${{ secrets.GOOGLE_MAPS_IOS_API_KEY_DEV }}
        run: ./tool/write_ios_maps_key_xcconfig.sh dev

      - name: Build dev iOS simulator artifact
        run: ./tool/flutter_with_env.sh dev build ios --debug --simulator --no-codesign

      - name: Build dev host iOS simulator artifact
        run: ./tool/flutter_with_env.sh dev --role host build ios --debug --simulator --no-codesign
