name: App Build Matrix

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  app-targets:
    name: App target contract
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - id: toolchain
        uses: ./.github/actions/load-toolchain

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ steps.toolchain.outputs.node-version }}

      - run: node tool/run.mjs check platform:app-targets platform:verify-ios-release-identity

  web:
    name: Web build
    needs: app-targets
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - id: toolchain
        uses: ./.github/actions/load-toolchain

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ steps.toolchain.outputs.node-version }}

      - uses: ./.github/actions/setup-flutter

      - run: flutter pub get

      - name: Build dev web artifact
        run: ./tool/flutter_with_env.sh dev build web --debug

      - name: Build dev host web artifact
        run: ./tool/flutter_with_env.sh dev --role host build web --debug

      # Also compile the prod config (prod dart-defines + prod Firebase
      # options) so a prod-only build break is caught on PRs, not at release.
      - name: Build prod web artifact
        run: ./tool/flutter_with_env.sh prod build web --release

      - name: Build prod host web artifact
        run: ./tool/flutter_with_env.sh prod --role host build web --release

  android:
    name: Android debug APK
    needs: app-targets
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v6

      - id: toolchain
        uses: ./.github/actions/load-toolchain

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ steps.toolchain.outputs.node-version }}

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ steps.toolchain.outputs.java-version }}

      - uses: ./.github/actions/setup-flutter

      - run: flutter pub get

      - name: Write dev Android Maps key
        env:
          GOOGLE_MAPS_ANDROID_API_KEY_DEV: ${{ secrets.GOOGLE_MAPS_ANDROID_API_KEY_DEV }}
        run: |
          key="${GOOGLE_MAPS_ANDROID_API_KEY_DEV:-}"
          if [[ -z "$key" ]]; then
            echo "Missing GOOGLE_MAPS_ANDROID_API_KEY_DEV secret."
            exit 1
          fi
          printf '\nGOOGLE_MAPS_ANDROID_API_KEY_DEV=%s\n' "$key" >> android/local.properties

      - name: Build dev Android debug artifact
        run: ./tool/flutter_with_env.sh dev build apk --debug

      - name: Build dev host Android debug artifact
        run: ./tool/flutter_with_env.sh dev --role host build apk --debug

  ios:
    name: iOS simulator build
    needs: app-targets
    runs-on: macos-26
    timeout-minutes: 50

    steps:
      - uses: actions/checkout@v6

      - id: toolchain
        uses: ./.github/actions/load-toolchain

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ steps.toolchain.outputs.node-version }}

      - uses: ./.github/actions/setup-flutter

      - run: flutter pub get

      - name: Verify Host v2 full-shell regression baselines
        run: |
          node tool/ui_capture/run_captures.mjs \
            --ids host_home_dashboard,host_home_events_list,host_inbox_queries,host_clubs_management \
            --output-dir build/host-shell-reference-captures \
            --output-layout capture-first
          node tool/design/check_reference_screens.mjs \
            --compare \
            --capture-dir build/host-shell-reference-captures \
            --capture-layout capture-first \
            --ids host_home_dashboard,host_home_events_list,host_inbox_queries,host_clubs_management \
            --strict

      - name: Write dev iOS Maps key
        env:
          GOOGLE_MAPS_IOS_API_KEY_DEV: ${{ secrets.GOOGLE_MAPS_IOS_API_KEY_DEV }}
        run: ./tool/write_ios_maps_key_xcconfig.sh dev

      - name: Build dev iOS simulator artifact
        run: ./tool/flutter_with_env.sh dev build ios --debug --simulator --no-codesign

      - name: Build dev host iOS simulator artifact
        run: ./tool/flutter_with_env.sh dev --role host build ios --debug --simulator --no-codesign
