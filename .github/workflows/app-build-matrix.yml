name: App Build Matrix

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  web:
    name: Web build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build dev web artifact
        run: ./tool/flutter_with_env.sh dev build web --debug

  android:
    name: Android debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build dev Android debug artifact
        run: ./tool/flutter_with_env.sh dev build apk --debug

  ios:
    name: iOS simulator build
    runs-on: macos-26
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build dev iOS simulator artifact
        run: ./tool/flutter_with_env.sh dev build ios --simulator --no-codesign
