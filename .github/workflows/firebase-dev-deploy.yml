name: Firebase Dev Deploy

on:
  workflow_run:
    workflows: ["App Build Matrix"]
    types: [completed]
    branches: [main]

concurrency:
  group: firebase-dev-deploy
  cancel-in-progress: false

permissions:
  actions: read
  checks: read
  contents: read
  id-token: write

jobs:
  deploy-dev:
    name: Deploy dev after main is green
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    environment: dev
    timeout-minutes: 60

    env:
      HEAD_SHA: ${{ github.event.workflow_run.head_sha }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.HEAD_SHA }}

      - name: Wait for required main checks
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const headSha = process.env.HEAD_SHA;
            const workflows = [
              'flutter-ci.yml',
              'functions-ci.yml',
              'firestore-rules-ci.yml',
              'contracts-ci.yml',
              'app-build-matrix.yml',
            ];
            const timeoutMs = 20 * 60 * 1000;
            // A push-triggered workflow creates its run within seconds. If one
            // has produced no run after this long it never will (renamed,
            // disabled, or path-filtered) — fail fast instead of waiting out
            // the full timeout.
            const missingTimeoutMs = 5 * 60 * 1000;
            const pollMs = 30 * 1000;
            const startedAt = Date.now();

            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            while (true) {
              const pending = [];
              const missing = [];
              const failures = [];

              for (const workflow_id of workflows) {
                let response;
                try {
                  response = await github.rest.actions.listWorkflowRuns({
                    owner,
                    repo,
                    workflow_id,
                    branch: 'main',
                    event: 'push',
                    head_sha: headSha,
                    per_page: 20,
                  });
                } catch (error) {
                  core.setFailed(
                    `Could not query workflow '${workflow_id}' ` +
                    `(${error.status || error.message}). If it was renamed or ` +
                    `removed, update the 'workflows' list in ` +
                    `.github/workflows/firebase-dev-deploy.yml.`,
                  );
                  return;
                }
                const run = response.data.workflow_runs.find(
                  (candidate) => candidate.head_sha === headSha,
                );

                if (!run) {
                  missing.push(workflow_id);
                  continue;
                }

                if (run.status !== 'completed') {
                  pending.push(`${workflow_id}: ${run.status}`);
                  continue;
                }

                if (run.conclusion !== 'success') {
                  failures.push(`${workflow_id}: ${run.conclusion}`);
                }
              }

              if (failures.length > 0) {
                core.setFailed(`Required main checks failed for ${headSha}: ${failures.join(', ')}`);
                return;
              }

              if (pending.length === 0 && missing.length === 0) {
                core.info(`All required main checks passed for ${headSha}.`);
                return;
              }

              const elapsedMs = Date.now() - startedAt;

              if (missing.length > 0 && elapsedMs > missingTimeoutMs) {
                core.setFailed(
                  `Workflows produced no run for ${headSha} after ` +
                  `${missingTimeoutMs / 60000} min: ${missing.join(', ')}. ` +
                  `They may be renamed, disabled, or path-filtered — check the ` +
                  `'workflows' list in .github/workflows/firebase-dev-deploy.yml.`,
                );
                return;
              }

              const waitingOn = [
                ...pending,
                ...missing.map((workflow_id) => `${workflow_id}: missing`),
              ];

              if (elapsedMs > timeoutMs) {
                core.setFailed(`Timed out waiting for required main checks: ${waitingOn.join(', ')}`);
                return;
              }

              core.info(`Waiting for required main checks: ${waitingOn.join(', ')}`);
              await sleep(pollMs);
            }

      - id: toolchain
        uses: ./.github/actions/load-toolchain

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ steps.toolchain.outputs.node-version }}
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ steps.toolchain.outputs.java-version }}

      - run: npm --prefix functions ci

      - run: npm install -g firebase-tools@${{ steps.toolchain.outputs.firebase-tools-version }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Contract check
        run: node tool/contracts/check_firestore_contract.mjs

      - name: Functions lint
        run: npm --prefix functions run lint

      - name: Functions tests
        run: npm --prefix functions test

      - name: Firestore rules tests
        run: firebase emulators:exec --project demo-catch-rules --only firestore,storage "npm --prefix functions run test:rules"

      - name: Deploy dev Firebase targets in safe order
        run: ./tool/deploy_firebase_targets.sh dev functions,firestore:indexes,firestore:rules,storage
