name: Tools CI

on:
  pull_request:
    paths:
      - ".github/actions/**"
      - "design/**"
      - "design_context_pack/**"
      - "docs/design_parity/**"
      - "package-lock.json"
      - "package.json"
      - "pubspec.lock"
      - "pubspec.yaml"
      - "tool/**"
      - "widgetbook/**"
      - ".github/workflows/tools-ci.yml"
      - "functions/package-lock.json"
      - "functions/package.json"
  push:
    branches: [main]
    paths:
      - ".github/actions/**"
      - "design/**"
      - "design_context_pack/**"
      - "docs/design_parity/**"
      - "package-lock.json"
      - "package.json"
      - "pubspec.lock"
      - "pubspec.yaml"
      - "tool/**"
      - "widgetbook/**"
      - ".github/workflows/tools-ci.yml"
      - "functions/package-lock.json"
      - "functions/package.json"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    name: Tool manifest preflight
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - id: toolchain
        uses: ./.github/actions/load-toolchain

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ steps.toolchain.outputs.node-version }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json

      - name: Check CI toolchain pins
        run: bash tool/ci/check_toolchain_consistency.sh

      - name: Validate tool manifest
        run: node tool/run.mjs check --manifest-only

  tool-buckets:
    name: Tool checks (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: core-audit
            categories: meta audit remote-ops branding
          - name: lint-scanners
            categories: lint scanners
          - name: contracts-data
            categories: contracts data demo firebase
          - name: platform-env
            categories: env platform migrations
          - name: marketing-design
            categories: marketing ui-capture design
          - name: host-discovery
            categories: host-discovery

    steps:
      - uses: actions/checkout@v6

      - id: toolchain
        uses: ./.github/actions/load-toolchain

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ steps.toolchain.outputs.node-version }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json

      - uses: ./.github/actions/setup-flutter

      - name: Install scanner dependencies
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - run: flutter pub get

      - run: npm ci

      - run: npm --prefix functions ci

      - name: Install marketing design browser
        if: matrix.name == 'marketing-design'
        run: npx playwright install --with-deps chromium

      - name: Check tool categories
        env:
          CATEGORIES: ${{ matrix.categories }}
        run: |
          for category in $CATEGORIES; do
            echo "==> tool category: ${category}"
            node tool/run.mjs check --category "${category}"
          done

  tools:
    name: Validate tool manifest and fast checks
    runs-on: ubuntu-latest
    needs:
      - preflight
      - tool-buckets
    if: always()
    timeout-minutes: 5

    steps:
      - name: Check tool job results
        env:
          PREFLIGHT_RESULT: ${{ needs.preflight.result }}
          BUCKETS_RESULT: ${{ needs['tool-buckets'].result }}
        run: |
          echo "preflight: ${PREFLIGHT_RESULT}"
          echo "tool buckets: ${BUCKETS_RESULT}"
          if [[ "${PREFLIGHT_RESULT}" != "success" || "${BUCKETS_RESULT}" != "success" ]]; then
            exit 1
          fi
