name: Tools CI

on:
  pull_request:
    paths:
      - "tool/**"
      - ".github/workflows/tools-ci.yml"
      - "functions/package-lock.json"
      - "functions/package.json"
  push:
    branches: [main]
    paths:
      - "tool/**"
      - ".github/workflows/tools-ci.yml"
      - "functions/package-lock.json"
      - "functions/package.json"

jobs:
  tools:
    name: Validate tool manifest and fast checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          channel: stable
          cache: true

      - name: Install scanner dependencies
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - run: flutter pub get

      - run: npm ci

      - run: npm --prefix functions ci

      - name: Validate tool manifest
        run: node tool/run.mjs check --manifest-only

      - name: Check meta tools
        run: node tool/run.mjs check --category meta

      - name: Check audit tools
        run: node tool/run.mjs check --category audit

      - name: Check remote ops tools
        run: node tool/run.mjs check --category remote-ops

      - name: Check branding tools
        run: node tool/run.mjs check --category branding

      - name: Check lint tools
        run: node tool/run.mjs check --category lint

      - name: Check scanner tools
        run: node tool/run.mjs check --category scanners

      - name: Check contract tools
        run: node tool/run.mjs check --category contracts

      - name: Check data tools
        run: node tool/run.mjs check --category data

      - name: Check demo tools
        run: node tool/run.mjs check --category demo

      - name: Check Firebase tools
        run: node tool/run.mjs check --category firebase

      - name: Check environment tools
        run: node tool/run.mjs check --category env

      - name: Check platform tools
        run: node tool/run.mjs check --category platform

      - name: Check migration tools
        run: node tool/run.mjs check --category migrations

      - name: Check marketing tools
        run: node tool/run.mjs check --category marketing

      - name: Check UI capture tools
        run: node tool/run.mjs check --category ui-capture

      - name: Check design tools
        run: node tool/run.mjs check --category design
