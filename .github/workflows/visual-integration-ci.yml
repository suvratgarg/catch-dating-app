name: Flutter Visual & Integration CI

on:
  pull_request:
    paths:
      - "assets/**"
      - "integration_test/**"
      - "lib/**"
      - "test/goldens/**"
      - "test/integration/**"
      - "tool/test_app_shell_integration.sh"
      - "tool/ci/check_toolchain_consistency.sh"
      - "tool/ci/toolchain.env"
      - "pubspec.yaml"
      - "pubspec.lock"
      - ".github/workflows/visual-integration-ci.yml"
  push:
    branches: [main]
    paths:
      - "assets/**"
      - "integration_test/**"
      - "lib/**"
      - "test/goldens/**"
      - "test/integration/**"
      - "tool/test_app_shell_integration.sh"
      - "tool/ci/check_toolchain_consistency.sh"
      - "tool/ci/toolchain.env"
      - "pubspec.yaml"
      - "pubspec.lock"
      - ".github/workflows/visual-integration-ci.yml"
  schedule:
    - cron: "17 3 * * 1-5"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  visual-and-integration:
    name: macOS goldens, headless integration & native smoke
    runs-on: macos-26
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-flutter

      - run: flutter config --enable-macos-desktop

      - run: flutter pub get

      - name: Flutter goldens (0.30% raster tolerance)
        run: flutter test --concurrency=1 test/goldens

      - name: Deterministic app-shell integration suites
        run: bash tool/test_app_shell_integration.sh

      - name: Hosted native app-shell smoke
        run: bash tool/test_app_shell_integration.sh macos smoke

      - name: Retain golden failure diffs
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: flutter-golden-failures-${{ github.run_id }}
          path: test/goldens/failures/
          if-no-files-found: ignore
          retention-days: 14
