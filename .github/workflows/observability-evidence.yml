name: Observability Evidence

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment where the evidence was captured.
        required: true
        default: staging
        type: choice
        options:
          - dev
          - staging
          - prod
      crashlytics_evidence:
        description: Crashlytics issue/nonfatal URL with environment, version, build, and user/custom-key proof.
        required: true
        type: string
      analytics_evidence:
        description: Analytics DebugView or Realtime URL/note proving expected events arrived.
        required: true
        type: string
      ga4_bigquery_evidence:
        description: GA4 BigQuery export dataset/link proof, or explicit approved deferral.
        required: true
        type: string
      app_build:
        description: App version/build and platform used for the smoke proof.
        required: true
        type: string

jobs:
  record:
    name: Record observability evidence
    runs-on: ubuntu-latest

    steps:
      - name: Write evidence summary
        run: |
          {
            echo "## Observability evidence"
            echo
            echo "- Environment: \`${{ inputs.environment }}\`"
            echo "- App build: ${{ inputs.app_build }}"
            echo "- Crashlytics: ${{ inputs.crashlytics_evidence }}"
            echo "- Analytics DebugView: ${{ inputs.analytics_evidence }}"
            echo "- GA4 BigQuery: ${{ inputs.ga4_bigquery_evidence }}"
            echo
            echo "This workflow records dashboard evidence in the Actions run summary."
          } >> "$GITHUB_STEP_SUMMARY"
