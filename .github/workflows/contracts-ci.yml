name: Contracts CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  schema-contracts:
    name: Validate schema contracts
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - id: toolchain
        uses: ./.github/actions/load-toolchain

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ steps.toolchain.outputs.node-version }}
          cache: npm
          cache-dependency-path: functions/package-lock.json

      # ajv / ajv-formats resolve from functions/node_modules via createRequire.
      - run: npm --prefix functions ci

      - name: Validate contract sources
        run: node tool/contracts/validate_schema_contracts.mjs

      - name: Verify generated schema contract outputs are current
        run: |
          node tool/contracts/generate_schema_contracts.mjs --check
          node --check tool/contracts/generated/schema_contract_validators.mjs
          node tool/contracts/generate_domain_classes.mjs --check

      - name: Check schema/type boundaries
        run: node tool/contracts/check_schema_type_boundaries.mjs

      - name: Check Dart domain dependency direction
        run: node tool/run.mjs check audit:dependency-direction

      - name: Check schema path literals
        run: node tool/contracts/check_schema_path_literals.mjs

      - name: Check schema fixtures
        run: node tool/contracts/check_schema_fixtures.mjs

      - name: Check Firestore rules semantics against schemas
        run: node tool/contracts/check_firestore_rules_semantics.mjs
