name: Firebase Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Firebase environment alias to deploy.
        required: true
        default: staging
        type: choice
        options:
          - dev
          - staging
          - prod
      targets:
        description: Comma-separated Firebase deploy targets. Known targets deploy in safe order; use remoteconfig deliberately.
        required: true
        default: functions,firestore:indexes,firestore:rules,storage
        type: string

concurrency:
  group: firebase-deploy-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - run: npm --prefix functions ci

      - run: npm install -g firebase-tools

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Contract check
        run: node tool/check_firestore_contract.mjs

      - name: Functions lint
        run: npm --prefix functions run lint

      - name: Functions tests
        run: npm --prefix functions test

      - name: Firestore rules tests
        run: firebase emulators:exec --project demo-catch-rules --only firestore,storage "npm --prefix functions run test:rules"

      - name: Deploy selected Firebase targets in safe order
        run: ./tool/deploy_firebase_targets.sh "${{ inputs.environment }}" "${{ inputs.targets }}"
