name: Firebase Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Firebase environment alias to deploy.
        required: true
        default: staging
        type: choice
        options:
          - dev
          - staging
          - prod
      targets:
        description: Comma-separated Firebase deploy targets. Known targets deploy in safe order; use remoteconfig deliberately.
        required: true
        default: functions,firestore:indexes,firestore:rules,storage
        type: string

concurrency:
  group: firebase-deploy-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6

      - id: toolchain
        uses: ./.github/actions/load-toolchain

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ steps.toolchain.outputs.node-version }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ steps.toolchain.outputs.java-version }}

      - run: npm --prefix functions ci

      - run: npm ci

      - run: npm install -g firebase-tools@${{ steps.toolchain.outputs.firebase-tools-version }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Contract check
        run: node tool/contracts/check_firestore_contract.mjs

      - name: Functions lint
        run: npm --prefix functions run lint

      - name: Functions tests
        run: npm --prefix functions test

      - name: Firestore rules tests
        run: firebase emulators:exec --project demo-catch-rules --only firestore,storage "npm --prefix functions run test:rules"

      - name: Deploy selected Firebase targets in safe order
        env:
          VITE_GTM_ID: ${{ vars.VITE_GTM_ID }}
          VITE_STORE_LINKS_MODE: ${{ vars.VITE_STORE_LINKS_MODE || 'prelaunch' }}
          VITE_APP_STORE_URL: ${{ vars.VITE_APP_STORE_URL }}
          VITE_PLAY_STORE_URL: ${{ vars.VITE_PLAY_STORE_URL }}
          VITE_WEBSITE_APPCHECK_SITE_KEY: ${{ vars.VITE_WEBSITE_APPCHECK_SITE_KEY }}
          VITE_ADMIN_DATA_MODE: ${{ vars.VITE_ADMIN_DATA_MODE }}
          VITE_ADMIN_FIREBASE_ENV: ${{ vars.VITE_ADMIN_FIREBASE_ENV }}
          VITE_ADMIN_APPCHECK_SITE_KEY: ${{ vars.VITE_ADMIN_APPCHECK_SITE_KEY }}
          VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ vars.VITE_FIREBASE_MEASUREMENT_ID }}
          DEPLOY_ENVIRONMENT: ${{ inputs.environment }}
          DEPLOY_TARGETS: ${{ inputs.targets }}
        run: ./tool/deploy_firebase_targets.sh "$DEPLOY_ENVIRONMENT" "$DEPLOY_TARGETS"
