name: Demo Ops CI

on:
  pull_request:
    paths:
      - "tool/demo_ops*.mjs"
      - "tool/recompute_event_*counts*.mjs"
      - "tool/recompute_club_*counts*.mjs"
      - "tool/demo_seed/**"
      - "docs/demo_data_seeding.md"
      - ".github/workflows/demo-ops-ci.yml"
  push:
    branches:
      - main
    paths:
      - "tool/demo_ops*.mjs"
      - "tool/recompute_event_*counts*.mjs"
      - "tool/recompute_club_*counts*.mjs"
      - "tool/demo_seed/**"
      - "docs/demo_data_seeding.md"
      - ".github/workflows/demo-ops-ci.yml"

jobs:
  demo-ops:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: functions/package-lock.json
      - run: npm ci --prefix functions
      - run: node --check tool/demo_ops.mjs
      - run: node --check tool/demo_ops_core.mjs
      - run: node --check tool/demo_ops_core.test.mjs
      - run: node --check tool/seed_demo_data.mjs
      - run: node --test tool/demo_ops_core.test.mjs tool/recompute_event_aggregate_counts.test.mjs tool/recompute_club_member_counts.test.mjs
