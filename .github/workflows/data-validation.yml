name: Firestore Data Validation

on:
  schedule:
    - cron: '30 20 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: Firebase environment alias to validate.
        required: true
        default: prod
        type: choice
        options:
          - dev
          - staging
          - prod
      max_docs:
        description: Per-collection document cap.
        required: true
        default: '5000'
        type: string
      fail_on_warning:
        description: Treat warnings as CI failures.
        required: true
        default: false
        type: boolean

jobs:
  validate:
    name: Validate ${{ github.event.inputs.environment || 'prod' }} Firestore data
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - run: npm --prefix functions ci

      - name: Select Firebase service account
        env:
          TARGET_ENV: ${{ github.event.inputs.environment || 'prod' }}
          FIREBASE_SERVICE_ACCOUNT_DEV: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DEV }}
          FIREBASE_SERVICE_ACCOUNT_STAGING: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_STAGING }}
          FIREBASE_SERVICE_ACCOUNT_PROD: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PROD }}
        run: |
          case "$TARGET_ENV" in
            dev) service_account="$FIREBASE_SERVICE_ACCOUNT_DEV" ;;
            staging) service_account="$FIREBASE_SERVICE_ACCOUNT_STAGING" ;;
            prod) service_account="$FIREBASE_SERVICE_ACCOUNT_PROD" ;;
            *) echo "Unsupported environment: $TARGET_ENV" >&2; exit 1 ;;
          esac

          if [[ -z "$service_account" ]]; then
            echo "Missing FIREBASE_SERVICE_ACCOUNT_${TARGET_ENV} secret." >&2
            exit 1
          fi

          credentials_path="$RUNNER_TEMP/firebase-service-account.json"
          printf '%s' "$service_account" > "$credentials_path"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$credentials_path" >> "$GITHUB_ENV"

      - name: Validate Firestore data
        env:
          TARGET_ENV: ${{ github.event.inputs.environment || 'prod' }}
          MAX_DOCS: ${{ github.event.inputs.max_docs || '5000' }}
          FAIL_ON_WARNING: ${{ github.event.inputs.fail_on_warning || false }}
        run: |
          args=(--env "$TARGET_ENV" --json --max-docs "$MAX_DOCS")
          if [[ "$FAIL_ON_WARNING" == "true" ]]; then
            args+=(--fail-on-warning)
          fi

          node tool/validate_firestore_data.mjs "${args[@]}" | tee firestore-data-validation.json

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: firestore-data-validation-${{ github.event.inputs.environment || 'prod' }}
          path: firestore-data-validation.json
