name: Firestore Rules Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - run: npm --prefix functions ci

      - run: npm install -g firebase-tools@15.20.0

      - run: node tool/contracts/check_firestore_contract.mjs

      - run: firebase emulators:exec --project demo-catch-rules --only firestore,storage "npm --prefix functions run test:rules"
