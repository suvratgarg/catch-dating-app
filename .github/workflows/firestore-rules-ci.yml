name: Firestore Rules Tests

on:
  pull_request:
    paths:
      - 'firestore.rules'
      - 'functions/test/firestore.rules.test.cjs'
      - 'functions/src/shared/firestore.ts'
      - 'functions/src/runClubs/**'
      - 'functions/package.json'
      - 'functions/package-lock.json'
      - 'lib/**/domain/**/*.dart'
      - 'lib/core/indian_city.dart'
      - 'tool/generate_firestore_types.dart'
      - 'tool/check_firestore_contract.mjs'
      - 'tool/firestore_contract.json'
      - 'tool/firestore_ts_overlay.json'
  push:
    branches: [main]
    paths:
      - 'firestore.rules'
      - 'functions/test/firestore.rules.test.cjs'
      - 'functions/src/shared/firestore.ts'
      - 'functions/src/runClubs/**'
      - 'functions/package.json'
      - 'functions/package-lock.json'
      - 'lib/**/domain/**/*.dart'
      - 'lib/core/indian_city.dart'
      - 'tool/generate_firestore_types.dart'
      - 'tool/check_firestore_contract.mjs'
      - 'tool/firestore_contract.json'
      - 'tool/firestore_ts_overlay.json'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - run: npm --prefix functions ci

      - run: npm install -g firebase-tools

      - run: node tool/check_firestore_contract.mjs

      - run: firebase emulators:exec --only firestore "npm --prefix functions run test:rules"
