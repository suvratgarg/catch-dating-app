name: Flutter CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  analysis-gates:
    name: Flutter analysis and gates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - id: toolchain
        uses: ./.github/actions/load-toolchain

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ steps.toolchain.outputs.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: ./.github/actions/setup-flutter

      - run: npm ci

      - run: flutter pub get

      - name: Design parity gate
        run: npm run design:parity:check

      - name: Design token drift check
        run: dart run tool/design_tokens.dart --check

      - name: Design context pack drift check
        run: node tool/design/build_context_pack.mjs --check

      - name: Backend error boundary gate
        run: npm run audit:backend-errors:check

      - name: Frontend error boundary gate
        run: npm run audit:frontend-errors:check

      - name: Static analysis
        run: flutter analyze --no-fatal-infos

      - name: Riverpod lint plugin smoke check
        run: bash tool/check_riverpod_lint.sh

      - name: Catch UI lint plugin smoke check
        run: bash tool/check_catch_ui_lints.sh

      - name: Sizing doctrine check
        run: bash tool/check_sizing.sh

      - name: UI local-constant wrappers check
        run: bash tool/check_ui_local_constant_wrappers.sh

      - name: UI allow-debt gate
        run: bash tool/check_ui_allow_debt.sh

      - name: Raw network image guard
        run: bash tool/check_no_raw_network_image.sh

      # Schema/codegen drift is covered by Contracts CI, which installs the
      # Node dependencies required by the schema generator.

  flutter-test-shards:
    name: Unit & widget tests shard ${{ matrix.shard_label }}/${{ matrix.shard_total }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard_index: 0
            shard_label: 1
            shard_total: 4
          - shard_index: 1
            shard_label: 2
            shard_total: 4
          - shard_index: 2
            shard_label: 3
            shard_total: 4
          - shard_index: 3
            shard_label: 4
            shard_total: 4

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-flutter

      - run: flutter pub get

      - name: Unit & widget tests
        env:
          SHARD_INDEX: ${{ matrix.shard_index }}
          SHARD_TOTAL: ${{ matrix.shard_total }}
        run: |
          find test -name '*_test.dart' -not -path 'test/goldens/*' | sort \
            | awk -v shard="${SHARD_INDEX}" -v total="${SHARD_TOTAL}" '((NR - 1) % total) == shard' \
            > /tmp/flutter_test_files.txt

          count="$(wc -l < /tmp/flutter_test_files.txt | tr -d '[:space:]')"
          echo "Running ${count} test files in shard ${SHARD_INDEX}/${SHARD_TOTAL}."
          if [[ "${count}" == "0" ]]; then
            exit 0
          fi

          mapfile -t files < /tmp/flutter_test_files.txt

          # Exact PNG goldens are generated against the local desktop renderer and
          # are intentionally tagged out of Ubuntu CI to avoid cross-platform font
          # antialiasing noise. Run them locally with `flutter test test/goldens`.
          flutter test --concurrency=1 --exclude-tags=golden "${files[@]}"

  analyze-and-test:
    name: Analyze & test
    runs-on: ubuntu-latest
    needs:
      - analysis-gates
      - flutter-test-shards
    if: always()
    timeout-minutes: 5

    steps:
      - name: Check Flutter CI results
        env:
          GATES_RESULT: ${{ needs['analysis-gates'].result }}
          TESTS_RESULT: ${{ needs['flutter-test-shards'].result }}
        run: |
          echo "analysis gates: ${GATES_RESULT}"
          echo "test shards: ${TESTS_RESULT}"
          if [[ "${GATES_RESULT}" != "success" || "${TESTS_RESULT}" != "success" ]]; then
            exit 1
          fi
