name: Flutter CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  analysis-gates:
    name: Flutter analysis and gates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - id: toolchain
        uses: ./.github/actions/load-toolchain

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ steps.toolchain.outputs.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: ./.github/actions/setup-flutter

      - run: npm ci

      - run: flutter pub get

      - name: Form and schema constraint alignment
        run: flutter test --concurrency=1 test/core/forms/contract_alignment_test.dart

      - name: Localization catalog and getter usage ratchet
        run: node tool/copy/check_l10n_key_usage.mjs --check --check-inventory

      - name: Design parity gate
        run: npm run design:parity:check

      - name: Check cross-stack component lexicon
        run: node tool/design/check_component_lexicon.mjs

      - name: Design token drift check
        run: dart run tool/design_tokens.dart --check

      - name: Design context pack drift check
        run: node tool/design/build_context_pack.mjs --check

      - name: Backend error boundary gate
        run: npm run audit:backend-errors:check

      - name: Frontend error boundary gate
        run: npm run audit:frontend-errors:check

      - name: Static analysis
        run: flutter analyze --no-fatal-infos

      - name: Riverpod lint plugin smoke check
        run: bash tool/check_riverpod_lint.sh

      - name: Catch UI lint plugin smoke check
        run: bash tool/check_catch_ui_lints.sh

      - name: Collect Catch UI analyzer diagnostics
        run: |
          set +e
          dart analyze --format machine > /tmp/catch-ui-analyze.machine 2>&1
          status=$?
          set -e
          if [[ "$status" != "0" && "$status" != "2" ]]; then
            cat /tmp/catch-ui-analyze.machine
            exit "$status"
          fi
          if grep -q 'An error occurred while executing an analyzer plugin' /tmp/catch-ui-analyze.machine; then
            cat /tmp/catch-ui-analyze.machine
            exit 1
          fi
          echo "$status" > /tmp/catch-ui-analyze.status
          echo 'CATCH_UI_ANALYZE_OUTPUT_PATH=/tmp/catch-ui-analyze.machine' >> "$GITHUB_ENV"
          echo "CATCH_UI_ANALYZE_STATUS=$status" >> "$GITHUB_ENV"

      - name: Catch UI spacing warning gate
        run: bash tool/check_catch_ui_lint_drift.sh --code 'catch_no_raw_ui_spacing|catch_use_section_list' --label spacing

      - name: Catch UI color warning gate
        run: bash tool/check_catch_ui_lint_drift.sh --code catch_no_raw_color --label color

      - name: Catch UI typography warning gate
        run: bash tool/check_catch_ui_lint_drift.sh --code 'catch_no_raw_text_style|catch_no_raw_font_drift|catch_no_direct_font_builder|catch_no_raw_letter_spacing|catch_text_requires_style' --label typography

      - name: Catch UI radius and fixed-dimension warning gate
        run: bash tool/check_catch_ui_lint_drift.sh --code 'catch_no_raw_radius|catch_no_raw_content_dimension|catch_no_local_design_constant' --label geometry

      - name: Catch UI token-arithmetic warning gate
        run: bash tool/check_catch_ui_lint_drift.sh --code catch_no_token_arithmetic --label token-arithmetic

      - name: Catch UI field and section warning gate
        run: bash tool/check_catch_ui_lint_drift.sh --code 'catch_use_named_catch_field_constructor|catch_use_named_catch_section_constructor' --label field-section-anatomy

      - name: Catch UI event-thumbnail warning gate
        run: bash tool/check_catch_ui_lint_drift.sh --code catch_event_detail_prefers_photo_thumbnail --label event-thumbnail

      - name: Catch UI promoted scanner warning gate
        run: bash tool/check_catch_ui_lint_drift.sh --code 'catch_no_raw_network_image|catch_no_presentation_platform_import|catch_no_tokens_prop_drilling|catch_no_legacy_spacing_token|catch_screen_gutter_uses_semantic_insets|catch_no_async_flush_hack' --label promoted-scanners

      - name: Catch UI info drift ratchet
        run: bash tool/check_catch_ui_lint_drift.sh --check

      - name: Catch UI enforcement generation and coverage
        run: |
          node tool/design/build_lint_enforcement_tables.mjs --check
          node tool/design/check_component_enforcement_coverage.mjs

      - name: Catch UI resolved composition contracts
        run: dart run tool/architecture/check_ui_composition_contracts.dart --check --json /tmp/catch-ui-composition.json

      - name: Widget cleanup remaining scanner ratchet
        run: bash tool/widget_cleanup_scan.sh --check

      - name: Export Catch UI lint drift artifact
        run: bash tool/check_catch_ui_lint_drift.sh --all --json /tmp/catch-ui-lint-drift.json

      - name: Upload Catch UI enforcement drift
        uses: actions/upload-artifact@v7
        with:
          name: catch-ui-enforcement-drift
          path: |
            /tmp/catch-ui-lint-drift.json
            /tmp/catch-ui-composition.json
          if-no-files-found: error

      - name: Sizing doctrine check
        run: bash tool/check_sizing.sh

      - name: UI local-constant wrappers check
        run: bash tool/check_ui_local_constant_wrappers.sh

      - name: UI allow-debt gate
        run: bash tool/check_ui_allow_debt.sh

      # Schema/codegen drift is covered by Contracts CI, which installs the
      # Node dependencies required by the schema generator.

  flutter-test-shards:
    name: Unit & widget tests shard ${{ matrix.shard_label }}/${{ matrix.shard_total }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard_index: 0
            shard_label: 1
            shard_total: 4
          - shard_index: 1
            shard_label: 2
            shard_total: 4
          - shard_index: 2
            shard_label: 3
            shard_total: 4
          - shard_index: 3
            shard_label: 4
            shard_total: 4

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-flutter

      - run: flutter pub get

      - name: Unit & widget tests
        env:
          SHARD_INDEX: ${{ matrix.shard_index }}
          SHARD_TOTAL: ${{ matrix.shard_total }}
        run: |
          find test -name '*_test.dart' \
            -not -path 'test/goldens/*' \
            -not -path 'test/integration/*' | sort \
            | awk -v shard="${SHARD_INDEX}" -v total="${SHARD_TOTAL}" '((NR - 1) % total) == shard' \
            > /tmp/flutter_test_files.txt

          count="$(wc -l < /tmp/flutter_test_files.txt | tr -d '[:space:]')"
          echo "Running ${count} test files in shard ${SHARD_INDEX}/${SHARD_TOTAL}."
          if [[ "${count}" == "0" ]]; then
            exit 0
          fi

          mapfile -t files < /tmp/flutter_test_files.txt

          # Exact PNG goldens are generated against the local desktop renderer and
          # are intentionally tagged out of Ubuntu CI to avoid cross-platform font
          # antialiasing noise. Run them locally with `flutter test test/goldens`.
          flutter test --concurrency=1 --exclude-tags=golden "${files[@]}"

  widgetbook:
    name: Widgetbook analyze & build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-flutter

      - name: Resolve Widgetbook dependencies
        working-directory: widgetbook
        run: flutter pub get

      - name: Analyze executable previews
        working-directory: widgetbook
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      - name: Build Widgetbook web app
        working-directory: widgetbook
        run: flutter build web --release

  analyze-and-test:
    name: Analyze & test
    runs-on: ubuntu-latest
    needs:
      - analysis-gates
      - flutter-test-shards
      - widgetbook
    if: always()
    timeout-minutes: 5

    steps:
      - name: Check Flutter CI results
        env:
          GATES_RESULT: ${{ needs['analysis-gates'].result }}
          TESTS_RESULT: ${{ needs['flutter-test-shards'].result }}
          WIDGETBOOK_RESULT: ${{ needs.widgetbook.result }}
        run: |
          echo "analysis gates: ${GATES_RESULT}"
          echo "test shards: ${TESTS_RESULT}"
          echo "widgetbook: ${WIDGETBOOK_RESULT}"
          if [[ "${GATES_RESULT}" != "success" || "${TESTS_RESULT}" != "success" || "${WIDGETBOOK_RESULT}" != "success" ]]; then
            exit 1
          fi
