name: Flutter CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  analyze-and-test:
    name: Analyze & test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Static analysis
        run: flutter analyze --no-fatal-infos

      - name: Unit & widget tests
        run: flutter test --concurrency=1

      # Schema/codegen drift is covered by Contracts CI, which installs the
      # Node dependencies required by the schema generator.
