name: catch_dating_app
description: "Catch — discover run clubs, book runs, and connect with other runners."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.1+3

environment:
  sdk: ^3.12.0

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  firebase_core: ^4.5.0
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3
  firebase_auth: ^6.2.0
  go_router: ^17.1.0
  cloud_functions: ^6.0.7
  razorpay_flutter: ^1.4.5
  envied: ^1.1.0
  freezed_annotation: ^3.0.0
  json_annotation: ^4.12.0
  cloud_firestore: ^6.1.3
  firebase_storage: ^13.1.0
  firebase_messaging: ^16.1.2
  intl: ^0.20.2
  flutter_localizations:
    sdk: flutter
  image_picker: ^1.2.1
  image: ^4.8.0
  geolocator: ^14.0.2
  package_info_plus: ^9.0.1
  url_launcher: ^6.3.2
  firebase_app_check: ^0.4.3
  share_plus: ^12.0.2
  shared_preferences: ^2.3.0
  firebase_crashlytics: ^5.2.0
  firebase_analytics: ^12.3.0
  firebase_remote_config: ^6.4.0
  country_code_picker: ^3.2.0
  pub_semver: ^2.2.0
  collection: ^1.19.0
  connectivity_plus: ^7.1.1
  shimmer: ^3.0.0
  google_maps_flutter: ^2.17.0
  http: ^1.6.0
  health: ^13.3.1
  mobile_scanner: ^7.2.0
  qr_flutter: ^4.1.0
  audioplayers: ^6.6.0
  phosphor_flutter: ^2.1.0
  flutter_reorderable_grid_view: ^5.6.0
  flutter_native_splash: ^2.4.7


dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0
  build_runner: ^2.11.1
  analyzer: ^12.1.0
  riverpod_generator: ^4.0.4
  riverpod_lint: ^3.1.4
  catch_ui_lints:
    path: packages/catch_ui_lints
  envied_generator: ^1.1.0
  freezed: ^3.0.0
  json_serializable: ^6.14.0
  flutter_launcher_icons: ^0.14.4
  fake_cloud_firestore: ^4.1.0+1
  firebase_auth_mocks: ^0.15.1
  json_schema: ^5.2.2
  test: ^1.31.0

dependency_overrides:
  phosphor_flutter:
    path: packages/phosphor_flutter

# Native brand colors mirror design_context_pack/design_system/tokens.json.
# Run `dart run tool/branding/generate_native_brand_assets.dart` after token
# changes that should affect launcher icons or native splash colors.
flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/catch_icon.png
  remove_alpha_ios: true
  web:
    generate: true
    image_path: assets/branding/catch_icon.png
    background_color: "#16140F"
    theme_color: "#16140F"

flutter_native_splash:
  color: "#F4F4F1"
  color_web: "#F4F4F1"
  color_dark: "#0F0E10"
  color_dark_web: "#0F0E10"
  image: assets/branding/catch_splash_mark_light.png
  image_dark: assets/branding/catch_splash_mark_dark.png
  android: true
  ios: true
  web: true
  android_12:
    color: "#F4F4F1"
    color_dark: "#0F0E10"
    image: assets/branding/catch_splash_mark_light.png
    image_dark: assets/branding/catch_splash_mark_dark.png

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  generate: true

  config:
    # Keep iOS/macOS on CocoaPods while FirebaseFirestore is supplied by the
    # prebuilt Invertase pod; Flutter SPM integration links duplicate symbols.
    enable-swift-package-manager: false

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/branding/catch_icon.png
    - assets/branding/catch_icon_round.png
    - assets/branding/catch_icon_square.png
    - assets/branding/catch_splash_mark_dark.png
    - assets/branding/catch_splash_mark_light.png
    - assets/branding/catch_hosts_icon.png
    - assets/branding/catch_hosts_logo.png
    - assets/fixtures/club_hero_portrait.jpg
    - assets/fixtures/profile_portrait.jpg
    - assets/audio/event_success/
    - assets/audio/celebration/
    - assets/fonts/OFL-Archivo.txt
    - assets/fonts/OFL-IBMPlexMono.txt
    - tool/demo/demo_seed/scenarios/host-demo.json
    - tool/demo/demo_seed/personas/us_nyc_sales_profile_projection.planned.json

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # Catch's three-role type system. Archivo is the voice/headline face, the
  # platform system font is the function/body face, and IBM Plex Mono is data.
  # Fonts are bundled for release/offline safety.
  fonts:
    - family: Archivo
      fonts:
        - asset: assets/fonts/Archivo-Roman-VF.ttf
    - family: IBM Plex Mono
      fonts:
        - asset: assets/fonts/IBMPlexMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/IBMPlexMono-Medium.ttf
          weight: 500
        - asset: assets/fonts/IBMPlexMono-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/IBMPlexMono-Bold.ttf
          weight: 700
