<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Host Edit Club" description="Host app — Edit a club. Modeled on the consumer edit-profile screen: back header, cover photos, and kicker'd sections of stacked InfoRow rows (Identity, Contact, Event defaults) with a Save-changes footer. Faithful to create_club_screen.dart in edit mode (initialClub), flattened from the wizard into one form." -->
<helmet>
  <script src="./ds-base.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/fill/style.css">
  <style>
    body { margin: 0; background: #E2E1DC; }
  </style>
</helmet>

<div style="min-height: 100vh; display: flex; justify-content: center; padding: 40px 16px; background: #E2E1DC; font-family: var(--font-function); color: var(--ink); box-sizing: border-box">
  <div data-screen-label="Host Edit Club" style="width: 390px; height: 812px; background: var(--bg); border-radius: 30px; border: 1px solid rgba(22,20,15,0.15); box-shadow: var(--shadow-overlay); overflow: hidden; display: flex; flex-direction: column; box-sizing: border-box">

    <x-import component-from-global-scope="CatchDesignSystem_3a44f2.StatusBar" hint-size="100%,44px"></x-import>

    <!-- top bar -->
    <x-import component-from-global-scope="CatchDesignSystem_3a44f2.AppBar" title="Edit club" on-back="{{ noop }}" hint-size="100%,56px" style="display: block"></x-import>

    <div style="flex: 1; min-height: 0; overflow: auto; padding: 18px var(--screen-px) 28px">

      <!-- Logo + photos -->
      <x-import component-from-global-scope="CatchDesignSystem_3a44f2.ClubPhotos" photos="{{ photos }}" count="{{ photoCount }}" on-logo="{{ noop }}" on-add="{{ noop }}" on-remove="{{ noop }}" hint-size="100%,210px" style="display: block"></x-import>

      <!-- Identity -->
      <section style="margin-top: 8px; border-top: 1px solid var(--line); padding-top: 18px">
        <div class="t-kicker" style="color: var(--ink2)">Identity</div>
        <div style="margin-top: 10px">
          <x-import component-from-global-scope="CatchDesignSystem_3a44f2.FieldGroup" hint-size="100%,260px" style="display: block">
            <sc-for list="{{ identity }}" as="e" hint-placeholder-count="4">
              <x-import component-from-global-scope="CatchDesignSystem_3a44f2.Field" icon="{{ e.icon }}" label="{{ e.caption }}" value="{{ e.text }}" trailing="chevron" divider="{{ e.divider }}" onClick="{{ noop }}"></x-import>
            </sc-for>
          </x-import>
        </div>
      </section>

      <!-- Contact -->
      <section style="margin-top: 8px; border-top: 1px solid var(--line); padding-top: 18px">
        <div class="t-kicker" style="color: var(--ink2)">Contact</div>
        <div style="margin-top: 10px">
          <x-import component-from-global-scope="CatchDesignSystem_3a44f2.FieldGroup" hint-size="100%,196px" style="display: block">
            <sc-for list="{{ contact }}" as="e" hint-placeholder-count="3">
              <x-import component-from-global-scope="CatchDesignSystem_3a44f2.Field" icon="{{ e.icon }}" label="{{ e.caption }}" value="{{ e.text }}" trailing="chevron" divider="{{ e.divider }}" onClick="{{ noop }}"></x-import>
            </sc-for>
          </x-import>
        </div>
      </section>

      <!-- Event defaults -->
      <section style="margin-top: 8px; border-top: 1px solid var(--line); padding-top: 18px">
        <div class="t-kicker" style="color: var(--ink2)">Event defaults</div>
        <div class="t-body-s" style="color: var(--ink3); margin: 4px 0 0">Prefill every new event this club creates.</div>
        <div style="margin-top: 10px">
          <x-import component-from-global-scope="CatchDesignSystem_3a44f2.FieldGroup" hint-size="100%,260px" style="display: block">
            <sc-for list="{{ defaults }}" as="e" hint-placeholder-count="4">
              <x-import component-from-global-scope="CatchDesignSystem_3a44f2.Field" icon="{{ e.icon }}" label="{{ e.caption }}" value="{{ e.text }}" trailing="chevron" divider="{{ e.divider }}" onClick="{{ noop }}"></x-import>
            </sc-for>
          </x-import>
        </div>
      </section>
    </div>

    <!-- save -->
    <div style="flex: none; padding: 12px 20px 18px; background: var(--bg); border-top: 1px solid var(--line)">
      <x-import component-from-global-scope="CatchDesignSystem_3a44f2.Button" full="{{ true }}" icon="floppy-disk" onClick="{{ noop }}" hint-size="100%,49px">Save changes</x-import>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 390, &quot;height&quot;: 812}}">
class Component extends DCLogic {
  renderVals() {
    return {
      noop: () => {},
      photoCount: '4',
      photos: [{ cover: true }, { cover: false }, { cover: false }, { cover: false }],
      identity: [
        { icon: 'users-three', caption: 'Club name', text: 'Sunday sea-face crew', trailing: 'chevron', divider: false },
        { icon: 'buildings', caption: 'City', text: 'Mumbai', trailing: 'chevron', divider: true },
        { icon: 'map-pin', caption: 'Area / neighbourhood', text: 'Bandra', trailing: 'chevron', divider: true },
        { icon: 'note', caption: 'Description', text: 'Dawn runs along the Bandra seafront, every Sunday since 2020. Easy pace, longer brunch.', trailing: 'chevron', divider: true },
      ],
      contact: [
        { icon: 'instagram-logo', caption: 'Instagram', text: '@sundayseafacecrew', trailing: 'chevron', divider: false },
        { icon: 'phone', caption: 'Phone', text: '98765 43210', trailing: 'chevron', divider: true },
        { icon: 'envelope-simple', caption: 'Email', text: 'hello@seafacecrew.com', trailing: 'chevron', divider: true },
      ],
      defaults: [
        { icon: 'sneaker-move', caption: 'Default activity', text: 'Social run', trailing: 'chevron', divider: false },
        { icon: 'ticket', caption: 'Admission', text: 'Open capacity', trailing: 'chevron', divider: true },
        { icon: 'cake', caption: 'Age range', text: '24\u201340', trailing: 'chevron', divider: true },
        { icon: 'arrow-u-up-left', caption: 'Cancellation policy', text: 'Standard', trailing: 'chevron', divider: true },
      ],
    };
  }
}
</script>
</body>
</html>
