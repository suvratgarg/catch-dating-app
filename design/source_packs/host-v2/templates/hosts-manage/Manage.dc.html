<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Host App — Manage" description="The consolidated per-event hub: Setup / Guests / Live / Report over one screen, opening on the event's lifecycle state. Setup = MetricGrid + host actions + danger zone; Guests = RosterBoard; Live = LiveConsole run-of-show + big check-in; Report = result MetricGrid + CSV exports. Folds in the old Manage + attendance + Event Success console. Composed purely of catalogue widgets." -->
<helmet>
  <script src="./ds-base.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/fill/style.css">
  <style>
    body { margin: 0; background: #E2E1DC; }
    .mbar { padding: 6px 20px 0; }
    .mtop { display: flex; align-items: center; gap: 10px; padding: 6px 0 10px; }
    .bk { width: 36px; height: 36px; border-radius: var(--radius-pill); border: 1px solid var(--line2); background: var(--surface); display: flex; align-items: center; justify-content: center; cursor: pointer; flex: none; }
    .ctxbar { display: flex; gap: 14px; padding: 4px 0 12px; }
    .ctxbar .ci { display: flex; align-items: center; gap: 6px; color: var(--ink2); }
    .ctxbar .ci i { color: var(--ink3); }
    .sechead { margin: 22px 0 12px; color: var(--ink2); }
    .danger { margin-top: 22px; color: var(--danger); }
    .bigcheck { display: flex; align-items: center; gap: 14px; width: 100%; background: var(--ink); color: var(--primary-ink); border: 0; border-radius: var(--radius-md); padding: 18px; cursor: pointer; font-family: inherit; margin-top: 12px; }
  </style>
</helmet>

<div style="min-height: 100vh; display: flex; justify-content: center; padding: 40px 16px; background: #E2E1DC; font-family: var(--font-function); color: var(--ink); box-sizing: border-box">
  <div data-screen-label="Host Manage" style="position: relative; width: 390px; height: 812px; background: var(--bg); border-radius: 30px; border: 1px solid rgba(22,20,15,0.15); box-shadow: var(--shadow-overlay); overflow: hidden; display: flex; flex-direction: column; box-sizing: border-box">

    <x-import component-from-global-scope="CatchDesignSystem_3a44f2.StatusBar" hint-size="100%,44px"></x-import>

    <div class="mbar">
      <div class="mtop">
        <div class="bk" onClick="{{ noop }}"><i class="ph ph-arrow-left"></i></div>
        <div style="flex: 1; min-width: 0">
          <div class="t-kicker" style="color: var(--ink3)">Bandra Social</div>
          <h2 class="t-title-l" style="margin: 2px 0 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis">Tuesday Trivia Night</h2>
        </div>
      </div>
      <div class="ctxbar">
        <span class="ci t-body-s"><i class="ph ph-calendar-blank"></i>Tonight · 8:00 PM</span>
        <span class="ci t-body-s"><i class="ph ph-map-pin"></i>The Daily Bar</span>
        <span class="ci t-body-s"><i class="ph ph-users-three"></i>24/30</span>
      </div>
      <x-import component-from-global-scope="CatchDesignSystem_3a44f2.SegPill" options="{{ modes }}" value="{{ mode }}" onChange="{{ setMode }}" hint-size="100%,42px"></x-import>
      <div style="height: 14px"></div>
    </div>

    <div style="flex: 1; min-height: 0; overflow: auto; padding: 2px 20px 24px">
      <sc-if value="{{ isSetup }}" hint-placeholder-val="{{ true }}">
        <x-import component-from-global-scope="CatchDesignSystem_3a44f2.MetricGrid" hint-size="100%,200px" style="display: block">
          <x-import component-from-global-scope="CatchDesignSystem_3a44f2.StatCard" value="24" unit="/30" label="Booked" sub="6 open" hint-size="100%,90px"></x-import>
          <x-import component-from-global-scope="CatchDesignSystem_3a44f2.StatCard" value="6" label="Waitlist" sub="2 to review" hint-size="100%,90px"></x-import>
          <x-import component-from-global-scope="CatchDesignSystem_3a44f2.StatCard" value="Free" label="Revenue est" hint-size="100%,90px"></x-import>
          <x-import component-from-global-scope="CatchDesignSystem_3a44f2.StatCard" value="Standard" label="Refund policy" hint-size="100%,90px"></x-import>
        </x-import>
        <div class="sechead t-mono-label">Host actions</div>
        <x-import component-from-global-scope="CatchDesignSystem_3a44f2.InfoGroup" hint-size="100%,120px" style="display: block">
          <x-import component-from-global-scope="CatchDesignSystem_3a44f2.InfoRow" icon="pencil-simple" label="Edit event details" value="Schedule · location" trailing="chevron" onClick="{{ noop }}"></x-import>
          <x-import component-from-global-scope="CatchDesignSystem_3a44f2.InfoRow" icon="share-network" label="Share private link" value="2 invite links" trailing="chevron" divider="{{ true }}" onClick="{{ noop }}"></x-import>
        </x-import>
        <div class="sechead danger t-mono-label">Danger zone</div>
        <x-import component-from-global-scope="CatchDesignSystem_3a44f2.InfoRow" icon="x-circle" label="Cancel event" value="Keeps records · notifies guests" trailing="chevron" danger="{{ true }}" onClick="{{ noop }}" style="display: block"></x-import>
      </sc-if>

      <sc-if value="{{ isGuests }}" hint-placeholder-val="{{ false }}">
        <x-import component-from-global-scope="CatchDesignSystem_3a44f2.RosterTable" columns="{{ rosterCols }}" hint-size="100%,300px" style="display: block">
          <x-import component-from-global-scope="CatchDesignSystem_3a44f2.RosterRow" person="Aanya Sharma" img="{{ portrait }}" meta="6:42 PM" signal="In" tone="success" action="{{ undoAction }}"></x-import>
          <x-import component-from-global-scope="CatchDesignSystem_3a44f2.RosterRow" person="Dev Patel" initials="DP" meta="BOOKED" signal="Due" tone="neutral" action="{{ checkinAction }}"></x-import>
          <x-import component-from-global-scope="CatchDesignSystem_3a44f2.RosterRow" person="Zoya Merchant" initials="ZM" meta="WANTS IN · 2 MUTUAL" signal="Request" tone="warning" action="{{ decideAction }}"></x-import>
          <x-import component-from-global-scope="CatchDesignSystem_3a44f2.RosterRow" person="Nikhil Rao" initials="NR" meta="WAITLISTED" signal="Wait" tone="warning" action="{{ offerAction }}"></x-import>
        </x-import>
      </sc-if>

      <sc-if value="{{ isLive }}" hint-placeholder-val="{{ false }}">
        <x-import component-from-global-scope="CatchDesignSystem_3a44f2.LiveConsole"
          step="{{ liveStep }}" total="{{ liveTotal }}" stage="ROUND" title="Round in play"
          instruction="Keep rounds tight; reveal scores between each. Swap anyone sitting out into a team."
          attendeeNote="Guests see the current round and the live scoreboard."
          nextLabel="Next: Mingle" onPrev="{{ noop }}" onNext="{{ noop }}" hint-size="100%,300px" style="display: block"></x-import>
        <button class="bigcheck" onClick="{{ noop }}">
          <i class="ph-fill ph-qr-code" style="font-size: 26px"></i>
          <span style="flex: 1; text-align: left"><span class="t-name" style="font-size: 15px; display: block">Check guests in</span><span class="t-body-s" style="color: #BAB2A7">18 of 24 arrived</span></span>
          <span class="t-headline" style="font-size: 30px">18</span>
        </button>
      </sc-if>

      <sc-if value="{{ isReport }}" hint-placeholder-val="{{ false }}">
        <x-import component-from-global-scope="CatchDesignSystem_3a44f2.MetricGrid" hint-size="100%,200px" style="display: block">
          <x-import component-from-global-scope="CatchDesignSystem_3a44f2.StatCard" value="26" label="Attended" sub="of 24 booked" hint-size="100%,90px"></x-import>
          <x-import component-from-global-scope="CatchDesignSystem_3a44f2.StatCard" value="2" label="No-shows" hint-size="100%,90px"></x-import>
          <x-import component-from-global-scope="CatchDesignSystem_3a44f2.StatCard" value="Free" label="Gross" hint-size="100%,90px"></x-import>
          <x-import component-from-global-scope="CatchDesignSystem_3a44f2.StatCard" value="3" label="Caught" sub="mutual matches" onClick="{{ noop }}" hint-size="100%,90px"></x-import>
        </x-import>
        <div class="sechead t-mono-label">Take it with you</div>
        <x-import component-from-global-scope="CatchDesignSystem_3a44f2.InfoGroup" hint-size="100%,120px" style="display: block">
          <x-import component-from-global-scope="CatchDesignSystem_3a44f2.InfoRow" icon="export" label="Attendance CSV" trailing="chevron" onClick="{{ noop }}"></x-import>
          <x-import component-from-global-scope="CatchDesignSystem_3a44f2.InfoRow" icon="export" label="Revenue CSV" trailing="chevron" divider="{{ true }}" onClick="{{ noop }}"></x-import>
        </x-import>
      </sc-if>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
const MODES = [
  { value: 'setup', label: 'Setup' },
  { value: 'guests', label: 'Guests' },
  { value: 'live', label: 'Live' },
  { value: 'report', label: 'Report' },
];

class Component extends DCLogic {
  state = { mode: 'setup' };

  renderVals() {
    const m = this.state.mode;
    return {
      noop: () => {},
      liveStep: 3,
      liveTotal: 5,
      portrait: '../../assets/sample-portrait.jpg',
      modes: MODES,
      mode: m,
      setMode: (v) => this.setState({ mode: v }),
      isSetup: m === 'setup',
      isGuests: m === 'guests',
      isLive: m === 'live',
      isReport: m === 'report',
      rosterCols: ['GUEST', 'SIGNAL', 'HOST ACTION'],
      undoAction: { type: 'button', label: 'Undo' },
      checkinAction: { type: 'button', label: 'Check in', primary: true },
      decideAction: { type: 'decide' },
      offerAction: { type: 'button', label: 'Offer' },
    };
  }
}
</script>
</body>
</html>
