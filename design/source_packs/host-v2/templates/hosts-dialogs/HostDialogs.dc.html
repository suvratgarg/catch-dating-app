<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Host Dialogs" description="Host app — the confirm dialogs (CatchAdaptiveDialog): cancel published event, unsaved changes on back, remove host, transfer ownership. Centered card over a scrim with two actions; destructive action is danger-filled. Faithful to the dialogs in create_event_screen.dart, edit_hosted_event_screen.dart, and host_team_management_section.dart. Tweak switches which dialog shows." -->
<helmet>
  <script src="./ds-base.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/fill/style.css">
  <style>
    body { margin: 0; background: #E2E1DC; }
  </style>
</helmet>

<div style="min-height: 100vh; display: flex; justify-content: center; padding: 40px 16px; background: #E2E1DC; font-family: var(--font-function); color: var(--ink); box-sizing: border-box">
  <div data-screen-label="Host Dialogs" style="position: relative; width: 390px; height: 812px; background: var(--bg); border-radius: 30px; border: 1px solid rgba(22,20,15,0.15); box-shadow: var(--shadow-overlay); overflow: hidden; display: flex; flex-direction: column; box-sizing: border-box">

    <x-import component-from-global-scope="CatchDesignSystem_3a44f2.StatusBar" hint-size="100%,44px"></x-import>

    <!-- dimmed backdrop -->
    <div style="flex: 1; min-height: 0; padding: 12px 20px; opacity: 0.5">
      <div class="t-kicker" style="color: var(--ink3)">HOST MANAGE · RUN #14</div>
      <h1 class="t-headline-s" style="margin: 6px 0 16px; color: var(--ink)">Sundowner 5K, Bandra seafront</h1>
      <div style="background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-md); height: 120px"></div>
    </div>

    <!-- confirm dialog — owns its own full-cover scrim + perfect centering -->
    <x-import component-from-global-scope="CatchDesignSystem_3a44f2.ConfirmDialog" title="{{ title }}" message="{{ message }}" cancel-label="{{ leftLabel }}" confirm-label="{{ rightLabel }}" danger="{{ rightDanger }}" on-cancel="{{ noop }}" on-confirm="{{ noop }}" on-dismiss="{{ noop }}" hint-size="100%,100%" style="position: absolute; inset: 0"></x-import>
  </div>
</div>

<x-import component="TweaksPanel" from="./tweaks-panel.jsx" hint-size="0px,0px">
  <x-import component="TweakSection" from="./tweaks-panel.jsx" label="Dialog" hint-size="0px,0px"></x-import>
  <x-import component="TweakSelect" from="./tweaks-panel.jsx" label="Which dialog" value="{{ dialog }}" options="{{ dialogOptions }}" onChange="{{ setDialog }}" hint-size="0px,0px"></x-import>
</x-import>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 390, &quot;height&quot;: 812}}">
const DIALOGS = {
  cancel: {
    title: 'Cancel this event?',
    message: 'Cancelling removes it from schedules but keeps attendee, payment, and history records. Attendees are notified and refunded per your cancellation policy.',
    leftLabel: 'Keep event', rightLabel: 'Cancel event', rightDanger: true,
  },
  unsaved: {
    title: 'Unsaved changes',
    message: 'You have unsaved changes. Would you like to save a draft?',
    leftLabel: 'Discard', rightLabel: 'Save draft', rightDanger: false,
  },
  remove: {
    title: 'Remove host?',
    message: 'Dev Patel will stay a club member but will lose host tools.',
    leftLabel: 'Cancel', rightLabel: 'Remove', rightDanger: true,
  },
  transfer: {
    title: 'Transfer ownership?',
    message: 'Dev Patel will become the club owner. You will remain a host.',
    leftLabel: 'Cancel', rightLabel: 'Transfer', rightDanger: false,
  },
};

const STORE = 'hostDialogs.tweaks';

class Component extends DCLogic {
  state = { dialog: this._read() };

  _read() {
    try {
      const v = JSON.parse(localStorage.getItem(STORE) || '{}').dialog;
      return DIALOGS[v] ? v : 'cancel';
    } catch (e) { return 'cancel'; }
  }

  setDialog(v) {
    this.setState({ dialog: v });
    try { localStorage.setItem(STORE, JSON.stringify({ dialog: v })); } catch (e) {}
    try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { dialog: v } }, '*'); } catch (e) {}
  }

  renderVals() {
    const d = DIALOGS[this.state.dialog] || DIALOGS.cancel;
    return {
      noop: () => {},
      dialog: this.state.dialog,
      setDialog: (v) => this.setDialog(v),
      dialogOptions: [
        { value: 'cancel', label: 'Cancel event' },
        { value: 'unsaved', label: 'Unsaved changes' },
        { value: 'remove', label: 'Remove host' },
        { value: 'transfer', label: 'Transfer ownership' },
      ],
      title: d.title,
      message: d.message,
      leftLabel: d.leftLabel,
      rightLabel: d.rightLabel,
      rightDanger: d.rightDanger,
      rightNormal: !d.rightDanger,
    };
  }
}
</script>
</body>
</html>
