// Avatar — photo or warm-tinted initials (HostAvatar candidate)
function Av({ p, size = 38, cls = '', border }) {
  const st = { width: size, height: size, fontSize: size * 0.36, background: p.tint || 'var(--primary-soft)' };
  if (border) st.borderColor = border;
  return <div className={'av '+cls} style={st}>{p.img ? <img src={p.img} alt="" /> : p.i}</div>;
}
function FacePile({ list, n, onDark }) {
  const bd = onDark ? '#211f23' : 'var(--surface)';
  return (
    <div className="facepile">
      {list.map((p, i) => <Av key={i} p={p} size={26} border={bd} />)}
      {n ? <div className="more" style={{ background: onDark ? 'rgba(244,240,232,0.16)' : 'var(--ink)', color: onDark ? '#F4F0E8' : 'var(--primary-ink)', borderColor: bd }}>+{n}</div> : null}
    </div>
  );
}

// SegPill — segmented control
function SegPill({ options, value, onChange }) {
  return <div className="seg">{options.map(o => {
    const v = typeof o === 'string' ? o : o.v, l = typeof o === 'string' ? o : o.l;
    return <button key={v} className={v === value ? 'on' : ''} onClick={() => onChange(v)}>{l}</button>;
  })}</div>;
}

// NextUpHero — the time-aware "wow" marquee on Today (dark register)
function NextUpHero({ ev, live, onRun, onShare }) {
  const acc = accentOf(ev.act);
  const state = live ? 'LIVE NOW' : ev.life === 'soon' ? 'STARTS IN 3H' : 'NEXT UP';
  return (
    <div className="hero catch-dark" style={{ background: '#18171A' }}>
      <div className="art"><div className="glow" style={{ background: acc }}></div></div>
      <div className="state">{live ? <span className="live"></span> : <i className="ph-fill ph-clock" style={{ fontSize: 12 }}></i>}{state}</div>
      <h2>{ev.title}</h2>

      <div className="stats">

        <div className="s"><b>{ev.wait}</b><span>Waiting</span></div>

}

// ActionQueue — cross-event host triage ("what needs you")
const QTINT = {
  warning: ['rgba(185,119,15,0.14)', 'var(--warning)'],
  gold: ['rgba(201,162,74,0.18)', '#8a6d22'],
  accent: ['var(--act-social-run-soft)', 'var(--act-social-run-deep)'],
  neutral: ['var(--primary-soft)', 'var(--ink2)'],
};
function ActionQueue({ items, onItem }) {
  return items.map(it => {
    const [bg, fg] = QTINT[it.tint];
    return (
      <button className="qcard" key={it.id} onClick={() => onItem(it)}>
        <div className="qi" style={{ background: bg, color: fg }}><i className={'ph-fill ph-'+it.icon}></i></div>
        <div className="qt"><b>{it.title}</b><span>{it.sub}</span></div>
        {it.n ? <div className="qn">{it.n}</div> : null}

}

// EventLifecycleRow — event-first row, state + pigment + fill
function EventRow({ ev, onOpen }) {
  const acc = accentOf(ev.act), pct = Math.round(ev.booked / ev.cap * 100);
  const tag = ev.life === 'soon' ? 'Tonight' : ev.life === 'past' ? (ev.attended + ' attended') : (ev.booked + '/' + ev.cap + ' booked');
  return (
    <button className="erow" onClick={() => onOpen(ev.id)}>
      <div className="spine" style={{ background: acc }}></div>
      <div className="dt" style={{ marginLeft: 4 }}><div className="d" style={{ color: ev.life === 'past' ? 'var(--ink3)' : 'var(--ink)' }}>{ev.d}</div><div className="mo">{ev.mo}</div></div>
      <div className="eb">
        <div className="et">{ev.title}</div>
        <div className="em">{ev.when} · {tag}</div>
        {ev.life !== 'past' && <div className="fill"><i style={{ width: pct + '%', background: acc }}></i></div>}

function RosterSheet({ open, onClose, act }) {
  const groups = [

  const SW = { in: ['var(--success)', 'Here'], due: ['var(--ink3)', 'Due'], req: ['var(--warning)', 'Review'], wait: ['var(--warning)', 'Waiting'] };
  return (<>
    <div className={'scrim'+(open ? ' on' : '')} onClick={onClose}></div>
    <div className="sheet" style={{ transform: open ? 'translateY(0)' : 'translateY(100%)' }}>

/* ── Manage overlay — consolidated event hub, roster tucked ── */
function Manage({ id, onClose, toast }) {
  const ev = eventById(id) || EVENTS[0];

  const [step, setStep] = useState(3);
  const acc = accentOf(ev.act);
  const STEPS = [['ARRIVAL','Arrival & first hello'],['OPENING','Team draw & rounds'],['ROUND','Round in play'],['MIXING','Mingle between rounds'],['CLOSING','Wrap & catch']];
  return (
    <div className={'overlay on'}>
      <div className="statusbar"><span>3:11</span><span className="r"><i className="ph-fill ph-cell-signal-full"></i><i className="ph-fill ph-battery-high"></i></span></div>
      <div className="mbar">

      </div>

        {mode === 'setup' && <>
          <div className="mgrid">

            <div className="mcard"><div className="v">{ev.wait}</div><div className="l">Waitlist</div><div className="d">{ev.req} to review</div></div>
            <div className="mcard"><div className="v">{ev.price ? '₹'+(ev.booked*ev.price).toLocaleString('en-IN') : 'Free'}</div><div className="l">Revenue est</div></div>
            <div className="mcard"><div className="v" style={{ fontSize: 19 }}>Standard</div><div className="l">Refund policy</div></div>
          </div>
          <div className="sechead"><span className="ml">Host actions</span></div>

          <button className="act danger" onClick={()=>toast('Cancel flow')}><i className="ph ph-x-circle lead"></i><div className="t"><b>Cancel event</b><span>Keeps records · notifies guests</span></div><i className="ph ph-caret-right chev"></i></button>
        </>}

        {mode === 'guests' && <>
          <div className="sub" style={{ fontSize: 13, color: 'var(--ink2)', margin: '4px 0 0' }}>Tap the peek any time, or browse here.</div>
          <RosterInline />
        </>}

        {mode === 'live' && <>
          <div className="card" style={{ padding: 18, borderColor: 'color-mix(in srgb, '+acc+' 30%, transparent)' }}>
            <div className="mono" style={{ fontSize: 9, fontWeight: 700, letterSpacing: '0.12em', color: deepOf(ev.act) }}>STEP {step+1} OF 5 · {STEPS[step][0]}</div>

      )}
      <RosterSheet open={roster} onClose={() => setRoster(false)} act={ev.act} />
    </div>
  );
}

function RosterInline() {
  const SW = { in: ['var(--success)', 'Here'], due: ['var(--ink3)', 'Due'], req: ['var(--warning)', 'Review'], wait: ['var(--warning)', 'Waiting'] };
  const groups = [['Expected · 4', PPL.filter(p=>p.g==='due')],['Requests · 2', PPL.filter(p=>p.g==='req')],['Waitlist · 1', PPL.filter(p=>p.g==='wait')]];
  return <div style={{ marginTop: 8 }}>{groups.map(([l,list])=>(<div key={l}>
    <div className="gl">{l}</div>
    {list.map((p,i)=>{ const [c,w]=SW[p.g]; return (<div className="prow" key={i}><Av p={p} size={44}/><div className="pn"><b>{p.n}</b><span>{p.m}</span></div>{p.g==='req'?<button className="warmbtn">Approve</button>:p.g==='wait'?<button className="warmbtn" style={{background:'var(--gold)'}}>Offer</button>:<span className="sdot" style={{color:c}}><i style={{background:c}}></i>{w}</span>}</div>); })}
  </div>))}</div>;
}

/* ── Insights — full analytics, the organizer's reflective home ── */
function genSeries(seed, n, base) {
  const dem = [], book = [];
  for (let i = 0; i < n; i++) {
    const w = 1 + 0.28 * Math.sin((i + seed) * 1.1) + 0.16 * Math.sin((i + seed) * 0.45);
    const b = Math.max(1, Math.round(base * w));
    book.push(b);
    dem.push(Math.max(b + 1, Math.round(b / (0.62 + 0.06 * Math.sin((i + seed) * 0.8)))));
  }
  return { dem, book };
}
const IMETRICS = [
  { ic: 'target', l: 'Fill rate', v: '86%' },
  { ic: 'seal-check', l: 'Check-in rate', v: '78%' },
  { ic: 'ticket', l: 'Bookings', v: '142' },
  { ic: 'heart', l: 'Mutual matches', v: '28' },
  { ic: 'arrows-clockwise', l: 'Repeat rate', v: '64%', badge: 'Partial' },
  { ic: 'currency-inr', l: 'Gross revenue', v: '\u20b948,000' },
];
function Insights({ onClose }) {
  const [range, setRange] = useState('30D');
  const [gran, setGran] = useState('WEEK');
  const n = { DAY: 30, WEEK: 12, MONTH: 6 }[gran], base = { DAY: 5, WEEK: 13, MONTH: 26 }[gran];
  const { dem, book } = genSeries(gran === 'WEEK' ? 3 : gran === 'MONTH' ? 5 : 2, n, base);
  const max = Math.max.apply(null, dem.concat(1));
  const sum = (a) => a.reduce((x, y) => x + y, 0);
  const axis = { DAY: ['30D AGO', '15D', 'TODAY'], WEEK: ['12W AGO', '6W', 'THIS WK'], MONTH: ['6MO', '3MO', 'NOW'] }[gran];
  return (
    <div className="overlay on">
      <div className="statusbar"><span>3:11</span><span className="r"><i className="ph-fill ph-cell-signal-full"></i><i className="ph-fill ph-battery-high"></i></span></div>
      <div className="mbar">
        <div className="top"><div className="bk" onClick={onClose}><i className="ph ph-arrow-left"></i></div><div className="tt"><div className="k">{ORG.name} · all events</div><h2>Insights</h2></div></div>
        <SegPill options={['7D','30D','90D','MONTH']} value={range} onChange={setRange} />
        <div style={{ height: 14 }}></div>
      </div>
      <div className="scroll"><div className="pad" style={{ paddingTop: 2, paddingBottom: 28 }}>
        <div className="mgrid">
          {IMETRICS.map((m, i) => (
            <div className="mcard" key={i} style={m.badge ? { borderColor: 'rgba(185,119,15,0.35)', background: 'rgba(185,119,15,0.06)' } : null}>
              <div style={{ display: 'flex', alignItems: 'center' }}><i className={'ph ph-'+m.ic} style={{ fontSize: 15, color: 'var(--ink2)' }}></i><span style={{ flex: 1 }}></span>{m.badge ? <Badge tone="warning">{m.badge}</Badge> : null}</div>
              <div className="v" style={{ fontSize: 24, marginTop: 12 }}>{m.v}</div><div className="l">{m.l}</div>
            </div>
          ))}
        </div>
        <div className="sechead"><span className="ml" style={{ flex: 1 }}>Trend</span>
          <span style={{ display: 'flex', gap: 5, alignItems: 'center' }}><span style={{ width: 8, height: 8, borderRadius: 2, background: 'var(--ink)', opacity: 0.85 }}></span><span className="mono" style={{ fontSize: 9, fontWeight: 700, color: 'var(--ink2)' }}>BOOKINGS</span></span>
          <span style={{ display: 'flex', gap: 5, alignItems: 'center', marginLeft: 10 }}><span style={{ width: 8, height: 8, borderRadius: 2, background: 'color-mix(in srgb, var(--ink) 14%, transparent)' }}></span><span className="mono" style={{ fontSize: 9, fontWeight: 700, color: 'var(--ink3)' }}>DEMAND</span></span>
        </div>
        <div style={{ marginBottom: 12 }}><SegPill options={[{v:'DAY',l:'Day'},{v:'WEEK',l:'Week'},{v:'MONTH',l:'Month'}]} value={gran} onChange={setGran} /></div>
        <div className="mcard">
          <div style={{ display: 'flex', gap: 18 }}>
            <div><div className="v" style={{ fontSize: 21 }}>{sum(book).toLocaleString()}</div><div className="l">Bookings</div></div>
            <div><div className="v" style={{ fontSize: 21 }}>{sum(dem).toLocaleString()}</div><div className="l">Demand</div></div>
            <div style={{ flex: 1 }}></div>
            <div style={{ textAlign: 'right' }}><div className="v" style={{ fontSize: 21 }}>{Math.round(sum(book)/sum(dem)*100)}%</div><div className="l">Fill</div></div>
          </div>
          <div style={{ display: 'flex', alignItems: 'flex-end', gap: n > 20 ? 2 : 4, height: 110, marginTop: 16 }}>
            {book.map((b, i) => (<div key={i} style={{ flex: 1, position: 'relative', height: '100%', display: 'flex', alignItems: 'flex-end' }}>
              <div style={{ width: '100%', height: (dem[i]/max*100)+'%', minHeight: 2, background: 'color-mix(in srgb, var(--ink) 12%, transparent)', borderRadius: '2px 2px 0 0' }}></div>
              <div style={{ position: 'absolute', left: 0, right: 0, bottom: 0, height: (b/max*100)+'%', minHeight: 2, background: 'var(--ink)', opacity: 0.85, borderRadius: '2px 2px 0 0' }}></div>
            </div>))}
          </div>
          <div style={{ display: 'flex', marginTop: 8 }}>{axis.map((a, i) => <span key={i} className="mono" style={{ flex: 1, fontSize: 9, fontWeight: 600, color: 'var(--ink3)', textAlign: i === 0 ? 'left' : i === 1 ? 'center' : 'right' }}>{a}</span>)}</div>
        </div>
        <div className="sechead"><span className="ml">Top events</span></div>
        {EVENTS.filter(e => e.life === 'past').map(e => (<div className="erow" key={e.id} style={{ cursor: 'default' }}>
          <div className="spine" style={{ background: accentOf(e.act) }}></div>
          <div className="dt" style={{ marginLeft: 4 }}><div className="d" style={{ color: 'var(--ink3)' }}>{e.d}</div><div className="mo">{e.mo}</div></div>
          <div className="eb"><div className="et">{e.title}</div><div className="em">{e.attended} attended · {e.wait} waitlisted{e.gross ? ' · \u20b9'+e.gross.toLocaleString('en-IN') : ' · free'}</div></div>
        </div>))}
        <div className="sechead"><span className="ml">Reviews &amp; saves</span></div>
        <div className="mcard" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '18px 12px' }}>
          {[['9','New reviews'],['4.8','Avg rating'],['64','Event saves'],['7','Responses']].map((s, i) => (<div key={i}><div className="v" style={{ fontSize: 20 }}>{s[0]}</div><div className="l">{s[1]}</div></div>))}
        </div>
        <div className="sechead"><span className="ml">Data quality</span></div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          <div className="dqr ok"><i className="ph-fill ph-check-circle"></i><span>Check-in scans recorded for all 6 events in range.</span></div>
          <div className="dqr warn"><i className="ph-fill ph-warning"></i><span>2 events have no published reviews yet — attendance closed but the prompt wasn't sent.</span></div>
        </div>
      </div></div>
    </div>
  );
}

/* ════════ APP SHELL ════════ */
const TABS = [
  ['today', 'Today', 'house', 'house-fill'],
  ['events', 'Events', 'ticket', 'ticket'],
  ['inbox', 'Inbox', 'chat-circle', 'chat-circle-fill'],
  ['organizer', 'Organizer', 'storefront', 'storefront-fill'],
];

function App() {
  const [tab, setTab] = useState(() => localStorage.getItem('hr.tab') || 'today');
  const [manageId, setManageId] = useState(null);
  const [insightsOpen, setInsightsOpen] = useState(false);
  const [toastMsg, setToastMsg] = useState(null);
  useEffect(() => { localStorage.setItem('hr.tab', tab); }, [tab]);
  const toast = (m) => { setToastMsg(m); clearTimeout(window.__t); window.__t = setTimeout(() => setToastMsg(null), 1900); };
  const go = { tab: setTab, manage: (id) => setManageId(id), create: () => toast('Create event wizard'), insights: () => setInsightsOpen(true) };

  return (<>
    <div className="statusbar"><span>3:11</span><span className="r"><i className="ph-fill ph-cell-signal-full"></i><i className="ph-fill ph-wifi-high"></i><i className="ph-fill ph-battery-high"></i></span></div>

    {tab === 'today' && <TodayScreen go={go} toast={toast} />}
    {tab === 'events' && <EventsScreen go={go} />}
    {tab === 'inbox' && <InboxScreen go={go} toast={toast} />}
    {tab === 'organizer' && <OrganizerScreen go={go} toast={toast} />}

    <div className="tabbar">
      {TABS.map(([id, label, ic, icf]) => (
        <button key={id} className={tab === id ? 'on' : ''} onClick={() => setTab(id)}>
          {id === 'inbox' && <span className="dot"></span>}
          <i className={'ph'+(tab === id ? '-fill ph-'+icf : ' ph-'+ic)}></i><span>{label}</span>
        </button>
      ))}
    </div>

    {manageId && <Manage id={manageId} onClose={() => setManageId(null)} toast={toast} />}
    {insightsOpen && <Insights onClose={() => setInsightsOpen(false)} />}
    <div className={'toast'+(toastMsg ? ' on' : '')}><i className="ph-fill ph-check-circle"></i>{toastMsg}</div>
  </>);
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
